<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Detail | ThinkTala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css?v=2">
    <link rel="stylesheet" href="/assets/css/ops-sidebar.css">
    <style>
        .detail-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
        }

        .detail-value {
            color: var(--text-heading);
            font-weight: 700;
            font-size: 1.15rem;
        }

        .toast-lite {
            display: none;
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            border: 1px solid rgba(249, 62, 62, 0.35);
            background: rgba(249, 62, 62, 0.95);
            color: #fff;
            border-radius: 8px;
            padding: 0.7rem 0.85rem;
            font-size: 0.9rem;
            max-width: 360px;
        }
    </style>
</head>

<body>
    <div id="ops-sidebar-placeholder"></div>
    <div id="ops-navbar-placeholder"></div>

    <div id="errorToast" class="toast-lite"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="fw-bold mb-1" style="color: var(--text-heading)">Customer Detail</h4>
                <p class="text-muted mb-0">Ringkasan profil loyalitas dan aktivitas customer</p>
            </div>
            <button class="btn btn-sm btn-outline-light" onclick="window.history.back()">
                <i class="fa-solid fa-arrow-left me-1"></i>Back
            </button>
        </div>

        <div class="detail-card mb-3">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="detail-label">Customer Name</div>
                    <div class="detail-value" id="customerName">-</div>
                </div>
                <div class="col-md-6">
                    <div class="detail-label">Email</div>
                    <div class="detail-value" id="customerEmail">-</div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="detail-label">Duration</div>
                    <div class="detail-value" id="durationValue">0 months</div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="detail-label">Transactions</div>
                    <div class="detail-value" id="transactionValue">0</div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="detail-label">Total Spent</div>
                    <div class="detail-value" id="spentValue">Rp0</div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="detail-label">Last Active</div>
                    <div class="detail-value" id="activeValue">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/za-theme.js"></script>
    <script src="/assets/js/management-layout.js?v=20260421"></script>
    <script>
        const ALLOWED_ROLES = new Set(['MANAGEMENT', 'SUPERADMIN', 'ADMIN']);

        function showToast(msg) {
            const el = document.getElementById('errorToast');
            el.textContent = msg;
            el.style.display = 'block';
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => {
                el.style.display = 'none';
            }, 3200);
        }

        function formatMoney(value) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                maximumFractionDigits: 0,
            }).format(Number(value || 0));
        }

        function formatDate(raw) {
            if (!raw) return '-';
            const d = new Date(raw);
            if (Number.isNaN(d.getTime())) return '-';
            return d.toLocaleString('id-ID', {
                day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function getCustomerIdFromPath() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts.length >= 3 ? parts[2] : '';
        }

        function enforceAccess() {
            let user = null;
            try { user = JSON.parse(localStorage.getItem('user') || 'null'); } catch (_e) {}
            if (!user || !user.id) {
                // Rely on backend cookie auth if localStorage is unavailable/stale.
                return true;
            }
            const role = String(user.role_code || user.level_code || user.level || '').toUpperCase();
            if (!ALLOWED_ROLES.has(role)) {
                showToast('Anda tidak memiliki akses ke halaman ini.');
                return false;
            }
            return true;
        }

        async function loadDetail() {
            const id = getCustomerIdFromPath();
            if (!id) {
                showToast('Detail customer tidak tersedia.');
                return;
            }

            try {
                const res = await fetch(`/api/dashboard/customer/${encodeURIComponent(id)}`, { credentials: 'include' });
                if (res.status === 404) {
                    showToast('Detail customer tidak tersedia.');
                    return;
                }
                if (res.status === 401) {
                    window.location.href = '/account/login';
                    return;
                }
                if (res.status === 403) {
                    showToast('Akses ditolak.');
                    return;
                }
                if (!res.ok) {
                    throw new Error('failed');
                }

                const body = await res.json();
                if (!body || !body.success || !body.data) {
                    throw new Error('invalid_payload');
                }

                const data = body.data;
                document.getElementById('customerName').textContent = data.customer_name || '-';
                document.getElementById('customerEmail').textContent = data.email || '-';
                document.getElementById('durationValue').textContent = `${Number(data.duration || 0)} months`;
                document.getElementById('transactionValue').textContent = Number(data.transactions || 0).toLocaleString('id-ID');
                document.getElementById('spentValue').textContent = formatMoney(data.total_spent || 0);
                document.getElementById('activeValue').textContent = formatDate(data.last_active);
            } catch (_e) {
                showToast('Detail customer tidak tersedia.');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            if (!enforceAccess()) return;
            loadDetail();
        });
    </script>
</body>

</html>
