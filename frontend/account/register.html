<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ThinkNalyze AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-body:#fff; --bg-banner:#050509; --accent-cyan:#00b4d8; --text-heading:#0f172a; --text-main:#334155; --text-muted:#64748b; --border-color:#e2e8f0; }
        body { background-color:var(--bg-body); color:var(--text-main); font-family:'Inter',sans-serif; height:100vh; overflow:hidden; }
        .login-wrapper { height:100vh; width:100%; }
        .banner-side { background-color:var(--bg-banner); position:relative; display:flex; flex-direction:column; justify-content:flex-end; padding:80px 60px; overflow:hidden; }
        #particles-js { position:absolute; width:100%; height:100%; top:0; left:0; background-color:#070716; z-index:0; filter:drop-shadow(0 0 8px rgba(0,242,255,0.8)); }
        .banner-side::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg,rgba(5,5,9,0) 0%,rgba(5,5,9,0.9) 100%); z-index:1; pointer-events:none; }
        .banner-content { position:relative; z-index:2; max-width:600px; pointer-events:none; }
        .testimonial-text { font-size:1.8rem; font-weight:300; line-height:1.4; color:#fff; margin-bottom:20px; font-style:italic; text-shadow:0 2px 10px rgba(0,0,0,0.5); }
        .testimonial-author { font-weight:700; color:#00f2ff; text-transform:uppercase; letter-spacing:1px; font-size:0.9rem; }
        .form-side { background:#fff; display:flex; align-items:center; justify-content:center; padding:40px; position:relative; overflow-y:auto; }
        .form-side::before { content:''; position:absolute; width:600px; height:600px; background:radial-gradient(circle,rgba(189,0,255,0.04) 0%,transparent 70%); top:-100px; right:-100px; z-index:0; }
        .register-container { width:100%; max-width:420px; z-index:1; }
        .brand-logo { font-size:2rem; font-weight:800; color:var(--text-heading); text-decoration:none; }
        .form-label { font-size:0.82rem; color:var(--text-heading); margin-bottom:6px; font-weight:600; }
        .input-group-text { background:#f8fafc; border:1px solid var(--border-color); border-right:none; color:var(--text-muted)!important; }
        .form-control { background:#fff; border:1px solid var(--border-color); color:var(--text-heading)!important; padding:10px 14px; border-radius:0 8px 8px 0; }
        .form-control::placeholder { color:#94a3b8!important; opacity:0.7; }
        .form-control:focus { background:#fff; border-color:#00b4d8; box-shadow:0 0 0 4px rgba(0,180,216,0.1); }
        .form-control.is-invalid { border-color:#dc2626; }
        .btn-primary-glow { background:linear-gradient(135deg,#00b4d8,#0077b6); border:none; color:#fff; font-weight:700; padding:12px; border-radius:8px; width:100%; transition:0.3s; }
        .btn-primary-glow:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,180,216,0.3); color:#fff; }
        .btn-primary-glow:disabled { opacity:0.5; transform:none; cursor:not-allowed; color:#fff; }
        .link-cyan { color:#00b4d8; text-decoration:none; transition:0.2s; font-weight:600; }
        .link-cyan:hover { text-decoration:underline; color:#0077b6; }
        .validation-msg { font-size:0.75rem; margin-top:3px; min-height:1rem; }
        .validation-msg.error { color:#dc2626; }
        .validation-msg.success { color:#059669; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; }
        .toast-msg { padding:14px 20px; border-radius:10px; color:#fff; font-size:0.9rem; margin-bottom:10px; animation:slideIn 0.3s ease; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .toast-msg.success { background:#059669; }
        .toast-msg.error { background:#dc2626; }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
        @media(max-width:992px) { .banner-side{display:none;} .form-side{background:#f8fafc;} }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container-fluid p-0">
        <div class="row g-0 login-wrapper">
            <!-- LEFT BANNER -->
            <div class="col-lg-6 banner-side">
                <div id="particles-js"></div>
                <div class="banner-content">
                    <div class="mb-4">
                        <span class="badge bg-dark border border-secondary text-cyan px-3 py-2 rounded-pill shadow">
                            <i class="fa-solid fa-rocket me-2" style="color:#00f2ff;"></i> Future is Here
                        </span>
                    </div>
                    <blockquote class="testimonial-text">"Intelligence is the ability to adapt to change. ThinkNalyze provides the tools for that adaptation."</blockquote>
                    <div class="testimonial-author">— AI Adaptation</div>
                </div>
            </div>

            <!-- RIGHT FORM -->
            <div class="col-lg-6 form-side">
                <div class="register-container">
                    <div class="mb-4">
                        <a href="/" class="brand-logo">Think<span style="color:#00b4d8;">Nalyze</span></a>
                        <h2 class="fw-bold mb-1 mt-2" style="color:var(--text-heading); font-size:1.4rem;">Create Account</h2>
                        <p class="small" style="color:var(--text-muted);">Isi data diri Anda untuk membuat akun baru.</p>
                    </div>

                    <form id="registerForm" novalidate>
                        <!-- Nama Lengkap -->
                        <div class="mb-2">
                            <label class="form-label">Nama Lengkap</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                                <input type="text" class="form-control" id="fullName" placeholder="Masukkan nama lengkap" required>
                            </div>
                            <div class="validation-msg" id="fullNameMsg"></div>
                        </div>

                        <!-- Email -->
                        <div class="mb-2">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" placeholder="name@company.com" required>
                            </div>
                            <div class="validation-msg" id="emailMsg"></div>
                        </div>

                        <!-- No. Telepon -->
                        <div class="mb-2">
                            <label class="form-label">No. Telepon</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                <input type="tel" class="form-control" id="phone" placeholder="08xxxxxxxxxx" required>
                            </div>
                            <div class="validation-msg" id="phoneMsg"></div>
                        </div>

                        <!-- Tanggal Lahir -->
                        <div class="mb-2">
                            <label class="form-label">Tanggal Lahir</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-regular fa-calendar"></i></span>
                                <input type="date" class="form-control" id="birthdate" required>
                            </div>
                            <div class="validation-msg" id="birthdateMsg"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-2">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="Minimal 8 karakter" required>
                                <span class="input-group-text" id="togglePassword" style="cursor:pointer; border-left:none; border-radius:0 8px 8px 0; background:#fff;">
                                    <i class="fa-regular fa-eye-slash"></i>
                                </span>
                            </div>
                            <div class="validation-msg" id="passwordMsg"></div>
                        </div>

                        <!-- Konfirmasi Password -->
                        <div class="mb-3">
                            <label class="form-label">Konfirmasi Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-shield-halved"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Ulangi password" required>
                                <span class="input-group-text" id="toggleConfirmPassword" style="cursor:pointer; border-left:none; border-radius:0 8px 8px 0; background:#fff;">
                                    <i class="fa-regular fa-eye-slash"></i>
                                </span>
                            </div>
                            <div class="validation-msg" id="confirmMsg"></div>
                        </div>

                        <button type="submit" class="btn btn-primary-glow" id="btnRegister" disabled>Daftar</button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="small" style="color:var(--text-muted);">Sudah punya akun?</span>
                        <a href="/account/login" class="link-cyan small ms-1">Masuk di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // ========== PARTICLES ==========
        particlesJS("particles-js",{"particles":{"number":{"value":100,"density":{"enable":true,"value_area":800}},"color":{"value":"#00f2ff"},"shape":{"type":"circle"},"opacity":{"value":0.8,"random":true,"anim":{"enable":true,"speed":1,"opacity_min":0.3}},"size":{"value":4,"random":true,"anim":{"enable":true,"speed":2,"size_min":0.1}},"line_linked":{"enable":true,"distance":150,"color":"#00f2ff","opacity":0.6,"width":1.5},"move":{"enable":true,"speed":1.5,"direction":"none","random":true,"out_mode":"out"}},"interactivity":{"detect_on":"window","events":{"onhover":{"enable":true,"mode":"grab"},"onclick":{"enable":true,"mode":"push"}},"modes":{"grab":{"distance":200,"line_linked":{"opacity":1}},"push":{"particles_nb":4}}},"retina_detect":true});

        // ========== DOM REFS ==========
        var elFullName = document.getElementById('fullName');
        var elEmail = document.getElementById('email');
        var elPhone = document.getElementById('phone');
        var elBirthdate = document.getElementById('birthdate');
        var elPassword = document.getElementById('password');
        var elConfirm = document.getElementById('confirmPassword');
        var btnRegister = document.getElementById('btnRegister');

        // Set max date to today
        elBirthdate.max = new Date().toISOString().split('T')[0];

        // ========== TOGGLE PASSWORD ==========
        document.getElementById('togglePassword').addEventListener('click', function() {
            var inp = elPassword;
            var icon = this.querySelector('i');
            if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye-slash','fa-eye'); }
            else { inp.type = 'password'; icon.classList.replace('fa-eye','fa-eye-slash'); }
        });
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            var inp = elConfirm;
            var icon = this.querySelector('i');
            if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye-slash','fa-eye'); }
            else { inp.type = 'password'; icon.classList.replace('fa-eye','fa-eye-slash'); }
        });

        // ========== TOAST ==========
        function showToast(msg, type) {
            type = type || 'error';
            var c = document.getElementById('toastContainer');
            var t = document.createElement('div');
            t.className = 'toast-msg ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function() { t.remove(); }, 4000);
        }

        // ========== VALIDATION HELPERS ==========
        function setMsg(id, msg, isError) {
            var el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'validation-msg ' + (isError ? 'error' : 'success');
        }
        function clearMsg(id) {
            var el = document.getElementById(id);
            el.textContent = '';
            el.className = 'validation-msg';
        }
        function isEmailValid(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ========== REAL-TIME VALIDATION ==========
        function validateAll() {
            var valid = true;
            if (elFullName.value.trim() === '') valid = false;
            var emailVal = elEmail.value.trim();
            if (!emailVal || !isEmailValid(emailVal)) valid = false;
            if (elPhone.value.trim() === '') valid = false;
            if (!elBirthdate.value) {
                valid = false;
            } else {
                var dob = new Date(elBirthdate.value);
                var today = new Date(); today.setHours(0,0,0,0);
                if (dob > today) valid = false;
            }
            if (elPassword.value.length < 8) valid = false;
            if (elConfirm.value === '' || elPassword.value !== elConfirm.value) valid = false;
            btnRegister.disabled = !valid;
        }

        elFullName.addEventListener('input', function() {
            if (elFullName.value.trim().length > 0 && elFullName.value.trim().length < 3)
                setMsg('fullNameMsg', 'Minimal 3 karakter', true);
            else clearMsg('fullNameMsg');
            validateAll();
        });
        elEmail.addEventListener('input', function() {
            var v = elEmail.value.trim();
            if (v && !isEmailValid(v)) setMsg('emailMsg', 'Format email tidak valid', true);
            else clearMsg('emailMsg');
            validateAll();
        });
        elPhone.addEventListener('input', function() {
            if (elPhone.value.trim().length > 0 && elPhone.value.trim().length < 8)
                setMsg('phoneMsg', 'Nomor telepon terlalu pendek', true);
            else clearMsg('phoneMsg');
            validateAll();
        });
        elBirthdate.addEventListener('change', function() {
            if (elBirthdate.value) {
                var dob = new Date(elBirthdate.value);
                var today = new Date(); today.setHours(0,0,0,0);
                if (dob > today) setMsg('birthdateMsg', 'Tanggal lahir tidak boleh di masa depan', true);
                else clearMsg('birthdateMsg');
            }
            validateAll();
        });
        elPassword.addEventListener('input', function() {
            var v = elPassword.value;
            if (v.length > 0 && v.length < 8) setMsg('passwordMsg', 'Password minimal 8 karakter', true);
            else if (v.length >= 8) setMsg('passwordMsg', '\u2713 Password valid', false);
            else clearMsg('passwordMsg');
            if (elConfirm.value && v !== elConfirm.value) setMsg('confirmMsg', 'Password tidak sama', true);
            else if (elConfirm.value && v === elConfirm.value) setMsg('confirmMsg', '\u2713 Password cocok', false);
            validateAll();
        });
        elConfirm.addEventListener('input', function() {
            if (elConfirm.value && elPassword.value !== elConfirm.value) setMsg('confirmMsg', 'Password tidak sama', true);
            else if (elConfirm.value && elPassword.value === elConfirm.value) setMsg('confirmMsg', '\u2713 Password cocok', false);
            else clearMsg('confirmMsg');
            validateAll();
        });

        // ========== SUBMIT ==========
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            btnRegister.disabled = true;
            btnRegister.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Mendaftar...';

            var payload = {
                full_name: elFullName.value.trim(),
                email: elEmail.value.trim().toLowerCase(),
                password: elPassword.value,
                no_telp: elPhone.value.trim(),
                tanggal_lahir: elBirthdate.value
            };

            try {
                var res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                var data = await res.json();
                if (data.status === true) {
                    showToast('Data diterima, silakan cek email Anda', 'success');
                    sessionStorage.setItem('otp_email', payload.email);
                    setTimeout(function() { window.location.href = '/account/verify-otp'; }, 1500);
                } else {
                    showToast(data.msg || 'Registrasi gagal!');
                    btnRegister.disabled = false;
                    btnRegister.innerHTML = 'Daftar';
                    validateAll();
                }
            } catch (err) {
                showToast('Koneksi ke server gagal!');
                btnRegister.disabled = false;
                btnRegister.innerHTML = 'Daftar';
                validateAll();
            }
        });
    </script>
</body>
</html>
