    <style>
        .discover-page {
            position: relative;
            isolation: isolate;
            --discover-content-pad: 30px;
        }

        .discover-page::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 360px;
            pointer-events: none;
            background: radial-gradient(circle at top right, rgba(0, 242, 255, 0.18), rgba(0, 242, 255, 0));
            z-index: -1;
        }

        .discover-page::after {
            content: "";
            position: absolute;
            top: 120px;
            left: calc(-1 * var(--discover-content-pad));
            width: calc(65% + var(--discover-content-pad));
            height: 280px;
            pointer-events: none;
            background: radial-gradient(circle at center left, rgba(0, 242, 255, 0.07), rgba(0, 242, 255, 0));
            z-index: -1;
        }

        .main-content.discover-page {
            padding-bottom: 120px;
        }

        .discover-hero-kicker {
            width: 44px;
            height: 4px;
            border-radius: 999px;
            margin-bottom: 14px;
            background: linear-gradient(90deg, #00f2ff 0%, rgba(0, 242, 255, 0.2) 100%);
            box-shadow: 0 0 16px rgba(0, 242, 255, 0.45);
        }

        .discover-title {
            font-size: clamp(1.8rem, 2.8vw, 2.9rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            color: var(--text-heading);
        }

        .discover-subtitle {
            color: var(--text-muted);
            font-size: 1.02rem;
            margin-bottom: 0;
        }

        .discover-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
            margin-bottom: 16px;
        }

        .discover-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .discover-tab {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 12px 10px;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .discover-tab:hover {
            color: var(--text-main);
        }

        .discover-tab.active {
            color: var(--accent-cyan);
            border-bottom-color: var(--accent-cyan);
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.55);
        }

        .discover-search {
            min-width: 260px;
            max-width: 320px;
            flex: 1;
            margin-left: auto;
            border: 1px solid var(--border-color);
            background: rgba(9, 14, 25, 0.85);
            border-radius: 12px;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .discover-search i {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .discover-search input {
            border: none;
            background: transparent;
            color: var(--text-main);
            width: 100%;
            font-size: 0.92rem;
            outline: none;
        }

        .discover-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--accent-cyan);
            font-size: 0.74rem;
            font-weight: 700;
        }

        .discover-section-title::after {
            content: "";
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.45), transparent);
            flex: 1;
        }

        .discover-section-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
        }

        .featured-grid {
            margin-bottom: 26px;
        }

        .featured-card {
            border: 1px solid rgba(0, 242, 255, 0.28);
            border-radius: 18px;
            background: linear-gradient(165deg, rgba(17, 28, 45, 0.95), rgba(10, 14, 22, 0.92));
            box-shadow: 0 0 0 1px rgba(0, 242, 255, 0.06) inset, 0 16px 36px rgba(0, 0, 0, 0.36);
            min-height: 100%;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .featured-card::before {
            content: "";
            position: absolute;
            right: -80px;
            top: -80px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.12), rgba(0, 242, 255, 0));
            pointer-events: none;
        }

        .featured-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.42);
        }

        .featured-media {
            position: relative;
            min-height: 320px;
            --featured-image: none;
            background-color: #0b0f19;
            background-image:
                var(--featured-image),
                radial-gradient(circle at 30% 20%, rgba(120, 255, 228, 0.18), rgba(7, 12, 20, 0.9)),
                linear-gradient(160deg, rgba(20, 26, 40, 0.98), rgba(6, 9, 16, 0.98));
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 24px;
        }

        .featured-media::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(6, 9, 16, 0.2), rgba(6, 9, 16, 0.92));
            pointer-events: none;

        .featured-body {
            position: relative;
            z-index: 1;

            flex-direction: column;
            gap: 12px;
            max-width: 520px;

        .featured-topline {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .featured-chip {
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
        }

        .featured-chip.pinned {
            color: #0ff2ff;
            border: 1px solid rgba(0, 242, 255, 0.55);
            background: rgba(0, 242, 255, 0.16);
        }

        .featured-title {
            font-size: clamp(1.5rem, 1.7vw, 2.2rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin: 0;
            color: #f8fbff;
        }

        .featured-desc {

            line-height: 1.65;

        .featured-meta {

            color: rgba(181, 201, 227, 0.75);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .featured-author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #f2f7ff;
        }

        .featured-type {
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .featured-type.type-promo {
            color: #88ff47;
            border: 1px solid rgba(136, 255, 71, 0.45);
            background: rgba(67, 144, 25, 0.25);
        }

        .featured-type.type-analysis {
            color: #2be8ff;
            border: 1px solid rgba(43, 232, 255, 0.45);
            background: rgba(18, 126, 139, 0.3);
        }

        .featured-type.type-feature {
            color: #ffe870;
            border: 1px solid rgba(255, 232, 112, 0.45);
            background: rgba(152, 122, 28, 0.25);
        }

        .featured-actions {
            margin-top: 6px;
        }

        .featured-cta {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00f2ff, #07d8df);
            color: #04151f;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 0.02em;
            padding: 11px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .featured-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0, 242, 255, 0.32);
            color: #04151f;
        }

        .recent-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-heading);
            margin-bottom: 12px;
            letter-spacing: -0.015em;
        }

        .recent-panel {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: rgba(12, 18, 30, 0.9);
            overflow: hidden;
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.26);
        }

        .recent-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 22px;
            align-items: stretch;
            padding: 22px 20px;
            min-height: 196px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .recent-item:last-child {
            border-bottom: none;
        }

        .recent-item:hover {
            background: rgba(0, 242, 255, 0.04);
        }

        .recent-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            gap: 10px;
        }

        .recent-author-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            color: rgba(202, 219, 241, 0.92);
            font-size: 0.88rem;
            min-height: 24px;
        }

        .recent-author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.26);
            background: rgba(255, 255, 255, 0.07);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: #e8f2ff;
            text-transform: uppercase;
        }

        .recent-author-name {
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .recent-media {
            width: 100%;
            min-height: 132px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }

        .recent-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recent-media.recent-media-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.65rem;
        }

        .recent-item-title {
            margin: 0;
            font-size: clamp(1.3rem, 1.45vw, 1.7rem);
            font-weight: 800;
            line-height: 1.25;
            color: #f4f9ff;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .recent-item-type {
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;

        .recent-item-type.type-promo {
            color: #88ff47;
            border: 1px solid rgba(136, 255, 71, 0.35);
            background: rgba(67, 144, 25, 0.2);
        }

        .recent-item-type.type-analysis {
            color: #2be8ff;
            border: 1px solid rgba(43, 232, 255, 0.35);
            background: rgba(18, 126, 139, 0.24);
        }

        .recent-item-type.type-feature {
            color: #ffe870;
            border: 1px solid rgba(255, 232, 112, 0.35);
            background: rgba(152, 122, 28, 0.2);
        }

        .recent-item-desc {
            margin: 0;
            color: rgba(225, 236, 255, 0.58);
            font-size: 0.99rem;
            line-height: 1.55;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .recent-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 4px;
        }

        .recent-meta {
            color: rgba(181, 201, 227, 0.72);
            font-size: 0.84rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .recent-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .recent-meta i {
            color: rgba(163, 191, 223, 0.78);
            font-size: 0.82rem;
        }

        .recent-link {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .recent-link:hover {
            color: #67f8ff;
        }

        .section-empty {
            border: 1px dashed rgba(0, 242, 255, 0.2);
            border-radius: 14px;
            color: var(--text-muted);
            padding: 22px;
            text-align: center;
            background: rgba(0, 242, 255, 0.03);
        }

        @media (max-width: 992px) {
            .discover-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .discover-search {
                max-width: none;
                width: 100%;
            }

            .featured-media {
                min-height: 280px;
            }

            .recent-item {
                grid-template-columns: minmax(0, 1fr) 188px;
                min-height: 180px;
                gap: 16px;
            }

            .recent-item-title {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .discover-page {
                --discover-content-pad: 16px;
            }

            .main-content.discover-page {
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .discover-tabs {
                gap: 0;
                width: 100%;
            }

            .discover-tab {
                flex: 1 1 48%;
                text-align: center;
            }

            .featured-card {
                border-radius: 16px;
            }

            .featured-title {
                font-size: 1.6rem;
            }

            .recent-item {
                grid-template-columns: 1fr;
                gap: 12px;
                min-height: 0;
            }

            .recent-media {
                order: -1;
                min-height: 168px;
            }

            .recent-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .recent-item-title {
                white-space: normal;
            }

            .recent-item-desc {
                white-space: normal;
            }
        }
    </style>
</head>

        const DISCOVER_STATE = {

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        function safeUrl(value) {
            if (!value) return '';
            try {
                const parsed = new URL(value, window.location.origin);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return parsed.href;
                }
                return '';
            } catch (err) {
                return '';
            }
        }

        function safeImageUrl(value) {
            const raw = String(value || '').trim();
            if (!raw) return '';
            if (raw.startsWith('data:image/')) return raw;
            if (raw.startsWith('http://') || raw.startsWith('https://')) return raw;
            if (raw.startsWith('/')) return raw;
            if (raw.startsWith('assets/') || raw.startsWith('uploads/')) return '/' + raw;

            const url = safeUrl(raw);
            return url || '';
        }

        function toDate(value) {
            const dt = new Date(value || 0);
            return Number.isNaN(dt.getTime()) ? null : dt;
        }

        function relativeTime(dt) {
            if (!dt) return 'Unknown time';
            const deltaMs = Date.now() - dt.getTime();
            const minutes = Math.max(1, Math.floor(deltaMs / 60000));
            if (minutes < 60) return minutes + ' min ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
            const days = Math.floor(hours / 24);
            return days + ' day' + (days > 1 ? 's' : '') + ' ago';
        }

        function shortDate(dt) {
            if (!dt) return '';
            return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function estimateReadTime(text) {
            const words = String(text || '').trim().split(/\s+/).filter(Boolean).length;
            if (words === 0) return '1 min read';
            return Math.max(1, Math.round(words / 35)) + ' min read';
        }

        function normalizeType(rawType) {
            const t = String(rawType || '').toLowerCase();
            if (t.includes('promo')) return 'promo';
            if (t.includes('analysis') || t.includes('education')) return 'analysis';
            if (t.includes('feature') || t.includes('update') || t.includes('system') || t.includes('event') || t.includes('warning') || t.includes('info')) {
                return 'feature';
            }
            return 'feature';
        }

        function typeMeta(type) {
            if (type === 'promo') {
                return {
                    className: 'type-promo',
                    label: 'Promo',
                    icon: 'fa-solid fa-gift',
                    iconColor: '#88ff47',
                    actionText: 'Read Terms'
                };
            }
            if (type === 'analysis') {
                return {
                    className: 'type-analysis',
                    label: 'Analysis',
                    icon: 'fa-solid fa-chart-column',
                    iconColor: '#2be8ff',
                    actionText: 'Open Full Report'
                };
            }
            return {
                className: 'type-feature',
                label: 'Feature',
                icon: 'fa-solid fa-bullhorn',
                iconColor: '#ffe870',
                actionText: 'Read More'
            };
        }

        function parseNotification(item, index) {
            const title = String(item.title || '').trim();
            const description = String(item.description || item.message || '').trim();
            if (!title && !description) return null;

            const type = normalizeType(item.type);
            const created = toDate(item.created_at);
            const expire = toDate(item.expiry_date);
            const author = String(item.author || item.author_name || item.source || '').trim();

            return {
                id: item.id || ('notification-' + index),
                title: title || 'Untitled update',
                description: description || 'No description available.',
                type: type,
                createdAt: created,
                expiryAt: expire,
                ctaUrl: safeUrl(item.cta_url),
                imageUrl: safeImageUrl(item.image_url),
                author: author,
                isPinned: Boolean(item.is_pinned || item.isPinned || item.pinned)
            };
        }

        function getNotificationQuery() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const roleRaw = (user.role_code || user.level_code || user.level || 'CLIENT');
                const role = String(roleRaw).trim().toLowerCase() || 'client';
                const userId = String(user.id || '').trim();

                const params = new URLSearchParams();
                params.set('role', role);
                if (userId) params.set('user_id', userId);
                return params.toString();
            } catch (err) {
                return 'role=client';
            }
        }

        async function fetchNotifications() {
            const query = getNotificationQuery();
            const endpoint = '/api/notifications/public?' + query;

            const res = await fetch(endpoint, {
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (!res.ok) {
                throw new Error('Failed with status ' + res.status);
            }

            const contentType = String(res.headers.get('content-type') || '').toLowerCase();
            if (!contentType.includes('application/json')) {
                throw new Error('Non-JSON response');
            }

            const json = await res.json();
            return Array.isArray(json.data) ? json.data : [];
        }

        function applyCountToSidebar(total) {
            if (typeof window.setClientDiscoverCount === 'function') {
                window.setClientDiscoverCount(total);
                return;
            }
            localStorage.setItem('client_discover_count', String(Math.max(0, total || 0)));
        }

        function getFilteredItems() {
            const keyword = DISCOVER_STATE.keyword.toLowerCase().trim();
            return DISCOVER_STATE.allItems.filter(function (item) {
                const byFilter = DISCOVER_STATE.activeFilter === 'all' || item.type === DISCOVER_STATE.activeFilter;
                if (!byFilter) return false;
                if (!keyword) return true;

                const text = (item.title + ' ' + item.description).toLowerCase();
                return text.includes(keyword);
            });
        }

        function renderFeatured(items) {
            const container = document.getElementById('featuredContainer');
            if (!container) return;

            if (items.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="section-empty">No featured update for this filter.</div></div>';
                return;
            }

            container.innerHTML = items.map(function (item) {
                const meta = typeMeta(item.type);
                const dateInfo = item.createdAt ? ('Published ' + relativeTime(item.createdAt)) : 'Published recently';
                const expiry = item.expiryAt ? (' - Expires ' + shortDate(item.expiryAt)) : '';
                const imageUrl = item.imageUrl || '';
                const mediaStyle = imageUrl ? 'style="--featured-image: url(' + imageUrl + ');"' : '';
                const authorHtml = item.author
                    ? '<span class="featured-author"><i class="fa-solid fa-circle-user"></i>' + escapeHtml(item.author) + '</span>'
                    : '';
                const actionHtml = item.ctaUrl
                    ? '<a class="featured-cta" href="' + item.ctaUrl + '" target="_blank" rel="noopener">' + escapeHtml(meta.actionText) + '<i class="fa-solid fa-arrow-right"></i></a>'
                    : '';
                return [
                    '<div class="col-xl-6 col-lg-6 col-12">',
                    '<article class="featured-card">',
                    '<div class="featured-media" ' + mediaStyle + '>',
                    '<div class="featured-body">',
                    '<div class="featured-topline">',
                    '<span class="featured-type ' + meta.className + '">' + escapeHtml(meta.label) + '</span>',
                    '</div>',
                    '<h3 class="featured-title">' + escapeHtml(item.title) + '</h3>',
                    '<p class="featured-desc">' + escapeHtml(item.description) + '</p>',
                    '<div class="featured-meta">' + authorHtml + '<span>' + escapeHtml(dateInfo + expiry) + '</span></div>',
                    '<div class="featured-actions">' + actionHtml + '</div>',
                    '</div>',
                    '</div>',
                    '</article>',
                    '</div>'
                ].join('');
            }).join('');
        }

        function renderRecent(items) {
            const container = document.getElementById('recentContainer');
            if (!container) return;

            if (items.length === 0) {
                container.innerHTML = '<div class="section-empty border-0 bg-transparent">No additional news found.</div>';
                return;
            }

            container.innerHTML = items.map(function (item) {
                const meta = typeMeta(item.type);
                const when = item.createdAt ? relativeTime(item.createdAt) : 'Recently';
                const dateText = item.createdAt ? shortDate(item.createdAt) : 'Unknown date';
                const read = estimateReadTime(item.description);
                const author = item.author || 'ThinkTala Desk';
                const authorInitial = escapeHtml((author.charAt(0) || 'T').toUpperCase());
                const media = item.imageUrl
                    ? '<div class="recent-media"><img src="' + item.imageUrl + '" alt="' + escapeHtml(item.title) + '"></div>'
                    : '<div class="recent-media recent-media-fallback" style="color:' + meta.iconColor + ';"><i class="' + meta.icon + '"></i></div>';
                const actionHtml = item.ctaUrl
                    ? '<a class="recent-link" href="' + item.ctaUrl + '" target="_blank" rel="noopener">Read Story <i class="fa-solid fa-arrow-right"></i></a>'
                    : '';

                return [
                    '<article class="recent-item">',
                    '<div class="recent-content">',
                    '<div class="recent-author-row">',
                    '<span class="recent-author-avatar">' + authorInitial + '</span>',
                    '<span class="recent-author-name">' + escapeHtml(author) + '</span>',
                    '<span class="recent-item-type ' + meta.className + '">' + escapeHtml(meta.label) + '</span>',
                    '</div>',
                    '<h3 class="recent-item-title">' + escapeHtml(item.title) + '</h3>',
                    '<p class="recent-item-desc">' + escapeHtml(item.description) + '</p>',
                    '<div class="recent-footer">',
                    '<div class="recent-meta">',
                    '<span><i class="fa-regular fa-calendar"></i>' + escapeHtml(dateText) + '</span>',
                    '<span><i class="fa-regular fa-clock"></i>' + escapeHtml(read) + '</span>',
                    '<span><i class="fa-regular fa-eye"></i>' + escapeHtml(when) + '</span>',
                    '</div>',
                    actionHtml,
                    '</div>',
                    '</div>',
                    media,
                    '</article>'
                ].join('');
            }).join('');
        }

        function renderDiscover() {
            const filtered = getFilteredItems();
            const pinned = filtered.filter(function (item) { return item.isPinned; });
            const nonPinned = filtered.filter(function (item) { return !item.isPinned; });
            const featured = pinned.slice(0, 2);

            if (featured.length < 2) {
                featured.push.apply(featured, nonPinned.slice(0, 2 - featured.length));
            }

            const featuredIds = new Set(featured.map(function (item) { return item.id; }));
            const recent = filtered.filter(function (item) {
                return !featuredIds.has(item.id) && !item.isPinned;
            });

            renderFeatured(featured);
            renderRecent(recent);
        }

        function setTabFilter(filter) {
            DISCOVER_STATE.activeFilter = filter;
            document.querySelectorAll('.discover-tab').forEach(function (btn) {
                const isActive = btn.getAttribute('data-filter') === filter;
                btn.classList.toggle('active', isActive);
            });
            renderDiscover();
        }

        function bindDiscoverControls() {
            document.querySelectorAll('.discover-tab').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    const filter = btn.getAttribute('data-filter') || 'all';
                    setTabFilter(filter);
                });
            });

            const searchInput = document.getElementById('discoverSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function () {
                    DISCOVER_STATE.keyword = searchInput.value || '';
                    renderDiscover();
                });
            }
        }

        async function initDiscoverPage() {
            bindDiscoverControls();

            let source = [];
            try {
                source = await fetchNotifications();
            } catch (err) {
                source = DISCOVER_FALLBACK;
            }

            const normalized = source.map(parseNotification).filter(Boolean).sort(function (a, b) {
                const aTime = a.createdAt ? a.createdAt.getTime() : 0;
                const bTime = b.createdAt ? b.createdAt.getTime() : 0;
                return bTime - aTime;
            });

            DISCOVER_STATE.allItems = normalized;
            applyCountToSidebar(normalized.length);
            renderDiscover();
        }

        document.addEventListener('DOMContentLoaded', initDiscoverPage);
    </script>
</body>
</html>
