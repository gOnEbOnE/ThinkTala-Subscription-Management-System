<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Ticket Support | ThinkTala Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css?v=2">
    <link rel="stylesheet" href="/assets/css/ops-sidebar.css">
    <style>
        .ticket-attachment-preview {
            max-width: 100%;
            max-height: 380px;
            border: 1px solid var(--border-color);
            background: #0e1325;
            object-fit: contain;
        }

        .meta-label {
            font-size: 0.74rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.2rem;
        }

        .meta-value {
            margin-bottom: 0;
            color: var(--text-main);
            font-weight: 600;
        }

        .thread-stack {
            position: relative;
            padding-left: 1.6rem;
        }

        .thread-stack::before {
            content: "";
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.15);
        }

        .thread-item {
            position: relative;
            margin-bottom: 1rem;
        }

        .thread-item:last-child {
            margin-bottom: 0;
        }

        .thread-dot {
            position: absolute;
            left: -1.1rem;
            top: 1rem;
            width: 12px;
            height: 12px;
            border-radius: 999px;
            border: 2px solid var(--bg-body);
            z-index: 2;
        }

        .thread-item.user .thread-dot {
            background: #92a2be;
        }

        .thread-item.admin .thread-dot {
            background: #72a9ff;
        }

        .message-card {
            border: 1px solid rgba(134, 156, 199, 0.25);
            border-radius: 0.6rem;
        }

        .message-card .message-content {
            white-space: pre-wrap;
            margin-bottom: 0;
            color: #d9e4ff;
        }

        .user-message-card {
            background: rgba(99, 113, 145, 0.2);
            border-color: rgba(152, 170, 205, 0.33);
            color: #dbe6ff;
        }

        .user-message-card strong,
        .user-message-card h6 {
            color: #ecf2ff !important;
        }

        .user-message-card .thread-user-meta,
        .user-message-card .thread-timestamp {
            color: #bccae8 !important;
        }

        .admin-message-card {
            background: rgba(58, 95, 155, 0.14);
            border-color: rgba(102, 146, 219, 0.32);
            color: #d9e4ff;
        }

        .admin-message-card .thread-admin-meta,
        .admin-message-card .thread-timestamp {
            color: #b7c9ef !important;
        }

        .thread-role-badge {
            font-size: 0.66rem;
            border: 1px solid rgba(144, 163, 199, 0.35);
            letter-spacing: 0.01em;
        }

        .thread-role-badge.user {
            background: rgba(132, 147, 180, 0.25);
            color: #deebff;
        }

        .thread-role-badge.admin {
            background: rgba(97, 151, 241, 0.24);
            color: #deecff;
        }

        .reply-form-card textarea {
            min-height: 120px;
            resize: vertical;
        }

        .reply-form-card .form-control,
        .reply-form-card .form-select {
            background: var(--bg-card);
            border-color: var(--border-color);
            color: var(--text-main);
        }

        .reply-form-card .form-control:focus,
        .reply-form-card .form-select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 0.2rem rgba(0, 242, 255, 0.12);
        }

        .reply-form-card .form-select option {
            background: #11162a;
            color: #e6ecff;
        }
    </style>
</head>

<body>
    <div id="ops-sidebar-placeholder"></div>
    <div id="ops-navbar-placeholder"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0" style="color: var(--text-heading)">Detail Ticket Support</h4>
                <small class="text-muted">Audit trail laporan dan jawaban admin</small>
            </div>
            <a href="/ops/tickets" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Kembali ke Monitoring Ticket
            </a>
        </div>

        <div id="ticketDetailContainer" class="d-grid gap-4">
            <div class="ai-card shadow-lg text-center text-muted py-5">
                <i class="fa-solid fa-spinner fa-spin me-2"></i>Memuat detail ticket...
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;">
        <div id="supportToast" class="toast align-items-center border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="supportToastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <footer class="fixed-footer">
        <div>&copy; 2026 <strong>ThinkTala</strong>. All rights reserved.</div>
        <div>Operations Panel v1.0</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/za-theme.js"></script>
    <script src="/assets/js/ops-layout.js?v=cs-support-2"></script>
    <script>
        const detailState = {
            loading: true,
            submitting: false,
            error: '',
            ticket: null,
            replies: []
        };

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            if (Number.isNaN(date.getTime())) {
                return '-';
            }
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${day}-${month}-${year} ${hour}:${minute}`;
        }

        function statusBadge(status) {
            const normalized = String(status || '').toUpperCase().trim();
            if (normalized === 'DONE') {
                return '<span class="badge fw-semibold px-2 py-1" style="background:#00d26a;color:#000;font-size:0.72rem;">DONE</span>';
            }
            if (normalized === 'ON PROCESS') {
                return '<span class="badge fw-semibold px-2 py-1" style="background:#ffc107;color:#000;font-size:0.72rem;">ON PROCESS</span>';
            }
            return `<span class="badge fw-semibold px-2 py-1" style="background:transparent;border:1px solid var(--border-color);color:var(--text-muted);font-size:0.72rem;">${escapeHtml(normalized || 'UNKNOWN')}</span>`;
        }

        function showToast(message, variant) {
            const toastEl = document.getElementById('supportToast');
            const toastBody = document.getElementById('supportToastBody');
            const bsToast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 3200 });

            toastBody.textContent = message;
            toastEl.classList.remove('text-bg-success', 'text-bg-danger', 'text-bg-warning');
            if (variant === 'success') {
                toastEl.classList.add('text-bg-success');
            } else if (variant === 'warning') {
                toastEl.classList.add('text-bg-warning');
            } else {
                toastEl.classList.add('text-bg-danger');
            }
            bsToast.show();
        }

        function renderAttachmentSection(ticket) {
            if (!ticket.attachment_url) {
                return '<p class="mb-0 text-muted">Tidak ada lampiran gambar.</p>';
            }

            const safeUrl = `${ticket.attachment_url}${ticket.attachment_url.includes('?') ? '&' : '?'}ts=${Date.now()}`;
            return `
                <div class="mt-2">
                    <img src="${safeUrl}" class="ticket-attachment-preview rounded" alt="Lampiran Ticket">
                    <div class="mt-2">
                        <a href="${safeUrl}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-secondary">
                            <i class="fa-solid fa-up-right-from-square me-1"></i> Buka Gambar Penuh
                        </a>
                    </div>
                </div>
            `;
        }

        function renderLoadingState() {
            return `
                <div class="ai-card shadow-lg text-center text-muted py-5">
                    <i class="fa-solid fa-spinner fa-spin me-2"></i>Memuat detail ticket...
                </div>
            `;
        }

        function renderErrorState(message) {
            return `
                <div class="ai-card shadow-lg text-center text-danger py-5">
                    <i class="fa-solid fa-circle-exclamation fa-2x mb-2 d-block"></i>
                    ${escapeHtml(message || 'Gagal memuat detail ticket.')}
                </div>
            `;
        }

        function renderTicketSummary(ticket) {
            return `
                <div class="ai-card shadow-lg">
                    <div class="row g-4">
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">ID Ticket</div>
                            <p class="meta-value">${escapeHtml(ticket.id || '-')}</p>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">Status</div>
                            <p class="meta-value">${statusBadge(ticket.status)}</p>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">Waktu Dibuat</div>
                            <p class="meta-value">${formatTime(ticket.created_at)}</p>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">Pelapor</div>
                            <p class="meta-value">${escapeHtml(ticket.user_name || '-')}</p>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">Email Pelapor</div>
                            <p class="meta-value">${escapeHtml(ticket.user_email || '-')}</p>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="meta-label">Kategori</div>
                            <p class="meta-value">${escapeHtml(ticket.category || '-')}</p>
                        </div>
                        <div class="col-12">
                            <div class="meta-label">Judul Masalah</div>
                            <p class="meta-value">${escapeHtml(ticket.title || '-')}</p>
                        </div>
                        <div class="col-12">
                            <div class="meta-label">Lampiran Gambar</div>
                            ${renderAttachmentSection(ticket)}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderConversationThread(ticket, replies) {
            const userMessageItem = `
                <div class="thread-item user">
                    <div class="thread-dot"></div>
                    <div class="card message-card user-message-card">
                        <div class="card-body">
                            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                                <div>
                                    <span class="badge thread-role-badge user me-2">Pesan User</span>
                                    <strong>${escapeHtml(ticket.user_name || 'User')}</strong>
                                </div>
                                <small class="thread-timestamp">${formatTime(ticket.created_at)}</small>
                            </div>
                            <h6 class="fw-bold mb-2">${escapeHtml(ticket.title || '-')}</h6>
                            <p class="message-content">${escapeHtml(ticket.description || '-')}</p>
                        </div>
                    </div>
                </div>
            `;

            const adminReplyItems = replies.map((reply, index) => `
                <div class="thread-item admin">
                    <div class="thread-dot"></div>
                    <div class="card message-card admin-message-card">
                        <div class="card-body">
                            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                                <div>
                                    <span class="badge thread-role-badge admin me-2">Jawaban Admin #${index + 1}</span>
                                    <small class="thread-admin-meta">ID Admin: ${escapeHtml(reply.admin_id || '-')}</small>
                                </div>
                                <small class="thread-timestamp">${formatTime(reply.created_at)}</small>
                            </div>
                            <p class="message-content">${escapeHtml(reply.message || '-')}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            const emptyReplyState = replies.length === 0
                ? '<div class="card message-card admin-message-card"><div class="card-body text-muted">Belum ada jawaban admin untuk ticket ini.</div></div>'
                : '';

            return `
                <div class="ai-card shadow-lg">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0" style="color: var(--text-heading)">Riwayat Percakapan</h5>
                        <small class="text-muted">Urutan kronologis</small>
                    </div>
                    <div class="thread-stack">
                        ${userMessageItem}
                        ${adminReplyItems}
                    </div>
                    <div class="mt-3">
                        ${emptyReplyState}
                    </div>
                </div>
            `;
        }

        function renderReplyComposer(ticket) {
            const normalizedStatus = String(ticket.status || '').toUpperCase().trim();
            const isDone = normalizedStatus === 'DONE';

            if (isDone) {
                return '';
            }

            const isDisabled = detailState.submitting;
            const disabledAttr = isDisabled ? 'disabled' : '';

            return `
                <div class="ai-card shadow-lg reply-form-card">
                    <h5 class="mb-3" style="color: var(--text-heading)">Kirim Jawaban Admin</h5>
                    <form id="replyForm" novalidate>
                        <div class="mb-3">
                            <label for="replyMessage" class="form-label fw-semibold">Pesan Jawaban</label>
                            <textarea id="replyMessage" class="form-control" maxlength="5000" placeholder="Tulis jawaban solusi untuk user..." ${disabledAttr}></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <small class="text-muted">Maksimal 5000 karakter</small>
                                <small class="text-muted" id="replyCounter">0/5000</small>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="replyStatus" class="form-label fw-semibold">Status Ticket Setelah Balas</label>
                            <select id="replyStatus" class="form-select" ${disabledAttr}>
                                <option value="ON PROCESS" ${normalizedStatus === 'ON PROCESS' ? 'selected' : ''}>ON PROCESS</option>
                                <option value="DONE" ${normalizedStatus === 'DONE' ? 'selected' : ''}>DONE</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" id="replySubmitBtn" class="btn btn-primary" ${disabledAttr}>
                                ${detailState.submitting
                                    ? '<i class="fa-solid fa-spinner fa-spin me-1"></i> Mengirim...'
                                    : '<i class="fa-solid fa-paper-plane me-1"></i> Kirim Jawaban'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
        }

        function setReplyFormSubmittingState(isSubmitting) {
            const form = document.getElementById('replyForm');
            if (!form || !detailState.ticket) {
                return;
            }

            const ticketIsDone = String(detailState.ticket.status || '').toUpperCase().trim() === 'DONE';
            const shouldDisable = ticketIsDone || isSubmitting;
            const messageInput = document.getElementById('replyMessage');
            const statusInput = document.getElementById('replyStatus');
            const submitBtn = document.getElementById('replySubmitBtn');

            if (messageInput) {
                messageInput.disabled = shouldDisable;
            }
            if (statusInput) {
                statusInput.disabled = shouldDisable;
            }
            if (submitBtn) {
                submitBtn.disabled = shouldDisable;
                submitBtn.innerHTML = isSubmitting
                    ? '<i class="fa-solid fa-spinner fa-spin me-1"></i> Mengirim...'
                    : '<i class="fa-solid fa-paper-plane me-1"></i> Kirim Jawaban';
            }
        }

        function bindReplyForm() {
            const form = document.getElementById('replyForm');
            if (!form) {
                return;
            }

            const messageInput = document.getElementById('replyMessage');
            const counter = document.getElementById('replyCounter');
            if (messageInput && counter) {
                const updateCounter = () => {
                    counter.textContent = `${messageInput.value.length}/5000`;
                };
                messageInput.addEventListener('input', updateCounter);
                updateCounter();
            }

            form.addEventListener('submit', submitReply);
        }

        function renderPage() {
            const container = document.getElementById('ticketDetailContainer');

            if (detailState.loading) {
                container.innerHTML = renderLoadingState();
                return;
            }

            if (detailState.error) {
                container.innerHTML = renderErrorState(detailState.error);
                return;
            }

            if (!detailState.ticket) {
                container.innerHTML = renderErrorState('Detail ticket tidak ditemukan.');
                return;
            }

            container.innerHTML = `
                ${renderTicketSummary(detailState.ticket)}
                ${renderConversationThread(detailState.ticket, detailState.replies)}
                ${renderReplyComposer(detailState.ticket)}
            `;

            bindReplyForm();
            setReplyFormSubmittingState(detailState.submitting);
        }

        function getTicketIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return String(params.get('id') || '').trim();
        }

        async function loadTicketDetail(showLoading) {
            const ticketId = getTicketIdFromURL();
            if (!ticketId) {
                detailState.loading = false;
                detailState.ticket = null;
                detailState.replies = [];
                detailState.error = 'Ticket ID tidak ditemukan.';
                renderPage();
                return;
            }

            if (showLoading) {
                detailState.loading = true;
                renderPage();
            }

            try {
                const res = await fetch(`/api/admin/support/tickets/${encodeURIComponent(ticketId)}`, {
                    credentials: 'include',
                    headers: { Accept: 'application/json' }
                });

                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(payload.error || `Gagal memuat detail ticket (${res.status})`);
                }

                const ticket = payload && typeof payload.ticket === 'object' ? payload.ticket : null;
                const replies = payload && Array.isArray(payload.replies) ? payload.replies : [];

                if (!ticket) {
                    throw new Error('Data ticket tidak tersedia.');
                }

                replies.sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());

                detailState.ticket = ticket;
                detailState.replies = replies;
                detailState.error = '';
            } catch (err) {
                detailState.ticket = null;
                detailState.replies = [];
                detailState.error = err.message || 'Gagal memuat detail ticket.';
            } finally {
                detailState.loading = false;
                renderPage();
            }
        }

        async function submitReply(event) {
            event.preventDefault();
            if (!detailState.ticket) {
                return;
            }

            const normalizedStatus = String(detailState.ticket.status || '').toUpperCase().trim();
            if (normalizedStatus === 'DONE') {
                showToast('Tiket ini sudah selesai dan tidak dapat dijawab kembali.', 'warning');
                return;
            }

            const messageInput = document.getElementById('replyMessage');
            const statusInput = document.getElementById('replyStatus');

            const message = String(messageInput ? messageInput.value : '').trim();
            const status = String(statusInput ? statusInput.value : '').trim();

            if (!message) {
                showToast('Pesan jawaban wajib diisi.', 'error');
                return;
            }

            if (message.length > 5000) {
                showToast('Pesan jawaban maksimal 5000 karakter.', 'error');
                return;
            }

            detailState.submitting = true;
            setReplyFormSubmittingState(true);

            try {
                const res = await fetch(`/api/admin/support/tickets/${encodeURIComponent(detailState.ticket.id)}/replies`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message,
                        status
                    })
                });

                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(payload.error || `Gagal mengirim jawaban (${res.status})`);
                }

                showToast('Jawaban berhasil dikirim.', 'success');
                detailState.submitting = false;
                await loadTicketDetail(false);
            } catch (err) {
                detailState.submitting = false;
                setReplyFormSubmittingState(false);
                showToast(err.message || 'Terjadi kesalahan saat mengirim jawaban.', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTicketDetail(true);
        });
    </script>
</body>

</html>
