<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Ticket Support | ThinkTala Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css?v=2">
    <link rel="stylesheet" href="/assets/css/ops-sidebar.css">
    <style>
        .ticket-attachment-preview {
            max-width: 100%;
            max-height: 380px;
            border: 1px solid var(--border-color);
            background: #0e1325;
            object-fit: contain;
        }

        .ticket-description {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div id="ops-sidebar-placeholder"></div>
    <div id="ops-navbar-placeholder"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0" style="color: var(--text-heading)">Detail Ticket Support</h4>
                <small class="text-muted">Informasi laporan kendala pelanggan</small>
            </div>
            <a href="/ops/tickets" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Kembali ke Dashboard
            </a>
        </div>

        <div class="ai-card shadow-lg" id="ticketCard">
            <div class="text-center text-muted py-5">
                <i class="fa-solid fa-spinner fa-spin me-2"></i>Memuat detail ticket...
            </div>
        </div>
    </div>

    <footer class="fixed-footer">
        <div>&copy; 2026 <strong>ThinkTala</strong>. All rights reserved.</div>
        <div>Operations Panel v1.0</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/za-theme.js"></script>
    <script src="/assets/js/ops-layout.js?v=cs-support-2"></script>
    <script>
        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            if (Number.isNaN(date.getTime())) return '-';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${day}-${month}-${year} ${hour}:${minute}`;
        }

        function statusBadge(status) {
            const normalized = String(status || '').toUpperCase();
            if (normalized === 'DONE') {
                return '<span class="badge fw-semibold px-2 py-1" style="background:#00d26a;color:#000;font-size:0.72rem;">DONE</span>';
            }
            if (normalized === 'ON PROCESS') {
                return '<span class="badge fw-semibold px-2 py-1" style="background:#ffc107;color:#000;font-size:0.72rem;">ON PROCESS</span>';
            }
            return `<span class="badge fw-semibold px-2 py-1" style="background:transparent;border:1px solid var(--border-color);color:var(--text-muted);font-size:0.72rem;">${normalized || 'UNKNOWN'}</span>`;
        }

        function renderAttachmentSection(ticket) {
            if (!ticket.attachment_url) {
                return '<p class="mb-0 text-muted">Tidak ada lampiran gambar.</p>';
            }

            const safeUrl = `${ticket.attachment_url}${ticket.attachment_url.includes('?') ? '&' : '?'}ts=${Date.now()}`;
            return `
                <div class="mt-2">
                    <img src="${safeUrl}" class="ticket-attachment-preview rounded" alt="Lampiran Ticket">
                    <div class="mt-2">
                        <a href="${safeUrl}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-secondary">
                            <i class="fa-solid fa-up-right-from-square me-1"></i> Buka Gambar Penuh
                        </a>
                    </div>
                </div>
            `;
        }

        async function loadTicketDetail() {
            const card = document.getElementById('ticketCard');
            const params = new URLSearchParams(window.location.search);
            const ticketId = params.get('id');

            if (!ticketId) {
                card.innerHTML = `
                    <div class="text-center text-danger py-5">
                        <i class="fa-solid fa-circle-exclamation fa-2x mb-2 d-block"></i>
                        Ticket ID tidak ditemukan.
                    </div>
                `;
                return;
            }

            try {
                const query = new URLSearchParams({
                    ticket_id: ticketId,
                    page: '1',
                    per_page: '1',
                    sort: 'newest'
                });

                const res = await fetch(`/api/admin/support/tickets?${query.toString()}`, {
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const raw = await res.json();
                const tickets = Array.isArray(raw) ? raw : (Array.isArray(raw.data) ? raw.data : []);
                const ticket = tickets.length > 0 ? tickets[0] : null;

                if (!ticket) {
                    card.innerHTML = `
                        <div class="text-center text-muted py-5">
                            <i class="fa-solid fa-inbox fa-2x mb-2 d-block"></i>
                            Detail ticket tidak ditemukan.
                        </div>
                    `;
                    return;
                }

                card.innerHTML = `
                    <div class="row g-4">
                        <div class="col-md-6">
                            <small class="text-muted d-block">ID Ticket</small>
                            <p class="mb-0 fw-semibold">${escapeHtml(ticket.id || '-')}</p>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted d-block">Status</small>
                            <p class="mb-0">${statusBadge(ticket.status)}</p>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted d-block">Pelapor</small>
                            <p class="mb-0 fw-semibold">${escapeHtml(ticket.user_name || '-')}</p>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted d-block">Waktu Dibuat</small>
                            <p class="mb-0">${formatTime(ticket.created_at)}</p>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted d-block">Kategori</small>
                            <p class="mb-0 fw-semibold">${escapeHtml(ticket.category || '-')}</p>
                        </div>
                        <div class="col-12">
                            <small class="text-muted d-block">Judul Masalah</small>
                            <p class="mb-0 fw-semibold">${escapeHtml(ticket.title || '-')}</p>
                        </div>
                        <div class="col-12">
                            <small class="text-muted d-block">Deskripsi</small>
                            <p class="mb-0 ticket-description">${escapeHtml(ticket.description || '-')}</p>
                        </div>
                        <div class="col-12">
                            <small class="text-muted d-block">Lampiran Gambar</small>
                            ${renderAttachmentSection(ticket)}
                        </div>
                    </div>
                `;
            } catch (err) {
                card.innerHTML = `
                    <div class="text-center text-danger py-5">
                        <i class="fa-solid fa-circle-exclamation fa-2x mb-2 d-block"></i>
                        Gagal memuat detail ticket.
                    </div>
                `;
                console.warn('Failed to load ticket detail:', err);
            }
        }

        document.addEventListener('DOMContentLoaded', loadTicketDetail);
    </script>
</body>

</html>
