<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notifications | ThinkTala Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css?v=2">
    <link rel="stylesheet" href="/assets/css/ops-sidebar.css">
</head>

<body>
    <div id="ops-sidebar-placeholder"></div>
    <div id="ops-navbar-placeholder"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0" style="color: var(--text-heading)">Manage Notifications</h4>
                <small class="text-muted">Create & manage notifications for users</small>
            </div>
            <button class="btn btn-sm px-3 py-2" style="background: var(--accent-cyan); color: #000; font-weight: 600;"
                data-bs-toggle="modal" data-bs-target="#notifModal" onclick="resetForm()">
                <i class="fa-solid fa-plus me-1"></i> New Notification
            </button>
        </div>

        <!-- Filter -->
        <div class="ai-card shadow-lg mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small text-muted">Search</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by title..."
                        style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Type</label>
                    <select class="form-select" id="filterType"
                        style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                        <option value="">All Types</option>
                        <option value="info">Info</option>
                        <option value="warning">Warning</option>
                        <option value="promo">Promo</option>
                        <option value="system">System</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">Status</label>
                    <select class="form-select" id="filterStatus"
                        style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                        <option value="">All</option>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100" onclick="loadNotifications()"><i
                            class="fa-solid fa-filter me-1"></i> Filter</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="ai-card shadow-lg">
            <div class="table-responsive">
                <table class="table table-hover mb-0" style="color: var(--text-main);">
                    <thead>
                        <tr class="text-muted small text-uppercase">
                            <th style="width: 5%;">#</th>
                            <th style="width: 25%;">Title</th>
                            <th style="width: 10%;">Type</th>
                            <th style="width: 10%;">Target</th>
                            <th style="width: 10%;">Status</th>
                            <th style="width: 15%;">Created</th>
                            <th style="width: 15%;" class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="notifTableBody">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4"><i
                                    class="fa-solid fa-spinner fa-spin me-2"></i>Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Create/Edit -->
    <div class="modal fade" id="notifModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="background: var(--bg-panel); border: 1px solid var(--border-color);">
                <div class="modal-header border-secondary" style="border-opacity: 0.2;">
                    <h5 class="modal-title fw-bold" id="modalTitle" style="color: var(--text-heading);">New Notification
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="notifId">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Title</label>
                        <input type="text" class="form-control" id="notifTitle" placeholder="Notification title"
                            style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Message</label>
                        <textarea class="form-control" id="notifMessage" rows="4" placeholder="Notification message..."
                            style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Type</label>
                            <select class="form-select" id="notifType"
                                style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                                <option value="info">Info</option>
                                <option value="warning">Warning</option>
                                <option value="promo">Promo</option>
                                <option value="system">System</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Target Role</label>
                            <select class="form-select" id="notifTarget"
                                style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                                <option value="all">All Users</option>
                                <option value="CLIENT">Clients Only</option>
                                <option value="OPERASIONAL">Staff Only</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Status</label>
                            <select class="form-select" id="notifActive"
                                style="background: var(--bg-card); border-color: var(--border-color); color: var(--text-main);">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary" style="border-opacity: 0.2;">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn px-4"
                        style="background: var(--accent-cyan); color: #000; font-weight: 600;"
                        onclick="saveNotification()">
                        <i class="fa-solid fa-check me-1"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content" style="background: var(--bg-panel); border: 1px solid var(--border-color);">
                <div class="modal-body text-center py-4">
                    <i class="fa-solid fa-triangle-exclamation fa-3x text-danger mb-3"></i>
                    <h6 class="fw-bold text-main">Delete Notification?</h6>
                    <p class="text-muted small">This action cannot be undone.</p>
                    <input type="hidden" id="deleteId">
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed-footer">
        <div>&copy; 2026 <strong>ThinkTala</strong>. All rights reserved.</div>
        <div>Operations Panel v1.0</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/za-theme.js"></script>
    <script src="/assets/js/ops-layout.js"></script>
    <script>
        const API_BASE = '/api';
        const token = localStorage.getItem('token');

        async function logout() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.clear();
            window.location.href = '/account/login';
        }

        function resetForm() {
            document.getElementById('notifId').value = '';
            document.getElementById('notifTitle').value = '';
            document.getElementById('notifMessage').value = '';
            document.getElementById('notifType').value = 'info';
            document.getElementById('notifTarget').value = 'all';
            document.getElementById('notifActive').value = 'true';
            document.getElementById('modalTitle').textContent = 'New Notification';
        }

        function editNotif(data) {
            document.getElementById('notifId').value = data.id;
            document.getElementById('notifTitle').value = data.title;
            document.getElementById('notifMessage').value = data.message;
            document.getElementById('notifType').value = data.type;
            document.getElementById('notifTarget').value = data.target_role;
            document.getElementById('notifActive').value = data.is_active.toString();
            document.getElementById('modalTitle').textContent = 'Edit Notification';
            new bootstrap.Modal(document.getElementById('notifModal')).show();
        }

        function openDelete(id) {
            document.getElementById('deleteId').value = id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        function typeBadge(type) {
            const map = {
                'info': 'bg-info bg-opacity-25 text-info',
                'warning': 'bg-warning bg-opacity-25 text-warning',
                'promo': 'bg-success bg-opacity-25 text-success',
                'system': 'bg-secondary bg-opacity-25 text-light'
            };
            return `<span class="badge ${map[type] || 'bg-secondary'}">${type}</span>`;
        }

        async function loadNotifications() {
            const tbody = document.getElementById('notifTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>Loading...</td></tr>';

            try {
                const res = await fetch(`${API_BASE}/notifications`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const json = await res.json();
                const list = json.data || [];

                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No notifications found</td></tr>';
                    return;
                }

                tbody.innerHTML = list.map((n, i) => `
                    <tr>
                        <td class="small">${i + 1}</td>
                        <td><strong class="text-main">${n.title}</strong><br><small class="text-muted">${n.message.substring(0, 60)}...</small></td>
                        <td>${typeBadge(n.type)}</td>
                        <td><span class="badge bg-dark border border-secondary">${n.target_role}</span></td>
                        <td>${n.is_active ? '<span class="badge bg-success bg-opacity-25 text-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>'}</td>
                        <td class="small text-muted">${new Date(n.created_at).toLocaleDateString()}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-info me-1" onclick='editNotif(${JSON.stringify(n)})'><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDelete('${n.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">Failed to load</td></tr>';
            }
        }

        async function saveNotification() {
            const id = document.getElementById('notifId').value;
            const body = {
                title: document.getElementById('notifTitle').value,
                message: document.getElementById('notifMessage').value,
                type: document.getElementById('notifType').value,
                target_role: document.getElementById('notifTarget').value,
                is_active: document.getElementById('notifActive').value === 'true'
            };

            const url = id ? `${API_BASE}/notifications/${id}` : `${API_BASE}/notifications`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('notifModal')).hide();
                    loadNotifications();
                } else {
                    alert('Failed to save');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function confirmDelete() {
            const id = document.getElementById('deleteId').value;
            try {
                await fetch(`${API_BASE}/notifications/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadNotifications();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>

</html>
