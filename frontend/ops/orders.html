<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pesanan | ThinkTala Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css?v=2">
    <link rel="stylesheet" href="/assets/css/ops-sidebar.css">
    <style>
        .orders-table {
            --bs-table-bg: transparent;
            --bs-table-striped-bg: transparent;
            --bs-table-hover-bg: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .orders-table td,
        .orders-table th {
            border-color: var(--border-color) !important;
            color: inherit;
            background: transparent !important;
        }

        .orders-table tbody tr:hover td {
            background: rgba(255, 255, 255, 0.03) !important;
        }

        .orders-table .col-invoice {
            color: var(--text-heading) !important;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .btn-action-detail {
            font-size: 0.78rem;
            padding: 4px 12px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div id="ops-sidebar-placeholder"></div>
    <div id="ops-navbar-placeholder"></div>

    <div class="main-content">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h4 class="fw-bold mb-0" style="color: var(--text-heading)">Daftar Pesanan</h4>
                <small class="text-muted">Riwayat seluruh transaksi pesanan dari semua klien</small>
            </div>
        </div>

        <!-- Table Section -->
        <div class="ai-card">
            <div class="mb-3">
                <h6 class="fw-bold mb-0" style="color: var(--text-heading)">Semua Pesanan</h6>
                <small class="text-muted" id="tableSubtitle">Memuat data...</small>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0 orders-table">
                    <thead>
                        <tr>
                            <th class="small fw-semibold py-3"
                                style="text-transform:uppercase;font-size:0.72rem;color:var(--text-muted);border-color:var(--border-color);">
                                Nomor Invoice</th>
                            <th class="small fw-semibold py-3"
                                style="text-transform:uppercase;font-size:0.72rem;color:var(--text-muted);border-color:var(--border-color);">
                                Nama User</th>
                            <th class="small fw-semibold py-3"
                                style="text-transform:uppercase;font-size:0.72rem;color:var(--text-muted);border-color:var(--border-color);">
                                Paket</th>
                            <th class="small fw-semibold py-3"
                                style="text-transform:uppercase;font-size:0.72rem;color:var(--text-muted);border-color:var(--border-color);">
                                Status</th>
                            <th class="small fw-semibold py-3 text-end"
                                style="text-transform:uppercase;font-size:0.72rem;color:var(--text-muted);border-color:var(--border-color);">
                                Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr>
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="fa-solid fa-spinner fa-spin me-2"></i>Memuat data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="d-flex justify-content-between align-items-center mt-3 pt-3"
                style="border-top: 1px solid var(--border-color);">
                <small class="text-muted" id="paginationInfo">Menampilkan 0 pesanan</small>
                <div id="paginationControls" class="d-flex gap-1"></div>
            </div>
        </div>
    </div>

    <footer class="fixed-footer">
        <div>&copy; 2026 <strong>ThinkTala</strong>. All rights reserved.</div>
        <div>Operations Panel v1.0</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/za-theme.js"></script>
    <script src="/assets/js/ops-layout.js"></script>
    <script>
        let allOrders = [];
        let currentPage = 1;
        const perPage = 10;

        async function logout() {
            try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.clear();
            window.location.href = '/account/login';
        }

        function statusBadge(status) {
            const map = {
                'PAID':      { bg: '#00d26a', color: '#000' },
                'PENDING':   { bg: '#ffc107', color: '#000' },
                'CANCELLED': { bg: '#dc3545', color: '#fff' },
                'EXPIRED':   { bg: 'transparent', color: 'var(--text-muted)', border: '1px solid var(--border-color)' },
            };
            const s = map[status] || map['EXPIRED'];
            const borderStyle = s.border ? `border:${s.border};` : '';
            return `<span class="badge fw-semibold px-2 py-1" style="background:${s.bg};color:${s.color};${borderStyle}font-size:0.72rem;">${status}</span>`;
        }

        function renderTable(orders) {
            const tbody = document.getElementById('ordersTableBody');
            const subtitle = document.getElementById('tableSubtitle');

            if (!orders.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="fa-solid fa-receipt fa-2x mb-2 d-block"></i>
                            Belum ada transaksi pesanan masuk
                        </td>
                    </tr>`;
                subtitle.textContent = '0 pesanan ditemukan';
                document.getElementById('paginationInfo').textContent = 'Menampilkan 0 pesanan';
                document.getElementById('paginationControls').innerHTML = '';
                return;
            }

            const total = orders.length;
            const totalPages = Math.ceil(total / perPage);
            const start = (currentPage - 1) * perPage;
            const pageData = orders.slice(start, start + perPage);

            subtitle.textContent = `${total} pesanan ditemukan`;

            tbody.innerHTML = pageData.map(order => `
                <tr>
                    <td class="py-3 col-invoice">${order.invoice_number || '—'}</td>
                    <td class="py-3">${order.client_name || '—'}</td>
                    <td class="py-3">${order.package_name || '—'}</td>
                    <td class="py-3">${statusBadge(order.status || 'PENDING')}</td>
                    <td class="py-3 text-end">
                        <a href="/ops/orders-detail?id=${order.order_id}"
                           class="btn btn-sm btn-outline-secondary btn-action-detail">
                            <i class="fa-solid fa-eye fa-xs me-1"></i>Detail/Verifikasi
                        </a>
                    </td>
                </tr>
            `).join('');

            const end = Math.min(start + perPage, total);
            document.getElementById('paginationInfo').textContent = `Menampilkan ${start + 1}–${end} dari ${total} pesanan`;

            const pages = document.getElementById('paginationControls');
            let html = `<button class="btn btn-sm btn-outline-secondary" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})" style="font-size:0.8rem;">&langle; Prev</button>`;
            const maxShow = Math.min(totalPages, 5);
            for (let i = 1; i <= maxShow; i++) {
                html += `<button class="btn btn-sm ${i === currentPage ? '' : 'btn-outline-secondary'}" onclick="changePage(${i})" style="min-width:36px;font-size:0.8rem;${i === currentPage ? 'background:var(--text-heading);color:#000;border-color:var(--text-heading);' : ''}">${i}</button>`;
            }
            if (totalPages > 5) {
                html += `<span class="btn btn-sm btn-outline-secondary disabled" style="font-size:0.8rem;">...</span>`;
                html += `<button class="btn btn-sm btn-outline-secondary" onclick="changePage(${totalPages})" style="font-size:0.8rem;">${totalPages}</button>`;
            }
            html += `<button class="btn btn-sm btn-outline-secondary" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})" style="font-size:0.8rem;">Next &rangle;</button>`;
            pages.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderTable(allOrders);
        }

        async function loadOrders() {
            try {
                const res = await fetch('/api/admin/orders', { credentials: 'include' });
                if (res.redirected || res.status === 401 || res.status === 403 || res.status === 302) {
                    window.location.href = '/account/login';
                    return;
                }
                const data = await res.json();
                allOrders = Array.isArray(data) ? data : (data.data || []);
                currentPage = 1;
                renderTable(allOrders);
            } catch (e) {
                document.getElementById('ordersTableBody').innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-5 text-danger">
                            <i class="fa-solid fa-circle-exclamation fa-2x mb-2 d-block"></i>
                            Gagal memuat data. Pastikan operational service berjalan.
                        </td>
                    </tr>`;
                document.getElementById('tableSubtitle').textContent = 'Gagal memuat';
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
