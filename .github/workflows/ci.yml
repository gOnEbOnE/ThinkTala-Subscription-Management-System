name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-lint-build:
    name: Go lint and build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dir: gateway
          - service: users
            dir: users
          - service: account
            dir: account
          - service: management
            dir: management
          - service: operational
            dir: operational
          - service: subscription
            dir: subscription
          - service: tickets
            dir: tickets
          - service: notification
            dir: notification

    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...
