name: Deploy Backend (Railway)

on:
  workflow_dispatch:
    inputs:
      deploy_notification:
        description: "Deploy notification service"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - "users/**"
      - "account/**"
      - "management/**"
      - "operational/**"
      - "subscription/**"
      - "tickets/**"
      - "notification/**"
      - ".github/workflows/deploy-backend-railway.yml"

jobs:
  deploy:
    name: Deploy Railway services
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
      DEPLOY_NOTIFICATION: ${{ inputs.deploy_notification || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy users
        working-directory: users
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service users \
            --message "CI deploy users ${GITHUB_SHA}"

      - name: Deploy account
        working-directory: account
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service account \
            --message "CI deploy account ${GITHUB_SHA}"

      - name: Deploy management
        working-directory: management
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service management \
            --message "CI deploy management ${GITHUB_SHA}"

      - name: Deploy operational
        working-directory: operational
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service operational \
            --message "CI deploy operational ${GITHUB_SHA}"

      - name: Deploy subscription
        working-directory: subscription
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service subscription \
            --message "CI deploy subscription ${GITHUB_SHA}"

      - name: Deploy tickets
        working-directory: tickets
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service tickets \
            --message "CI deploy tickets ${GITHUB_SHA}"

      - name: Deploy gateway
        working-directory: gateway
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service gateway \
            --message "CI deploy gateway ${GITHUB_SHA}"

      - name: Deploy notification (optional)
        if: ${{ env.DEPLOY_NOTIFICATION == 'true' }}
        working-directory: notification
        run: |
          railway up --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service notification \
            --message "CI deploy notification ${GITHUB_SHA}"
