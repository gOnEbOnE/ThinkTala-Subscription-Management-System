<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasional Dashboard | ThinkNalyze</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6C63FF; --dark: #1a1a2e; --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f6fc; }
        .sidebar { width: var(--sidebar-w); height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; color: #fff; padding: 20px 0; }
        .sidebar .logo { padding: 0 20px 30px; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #8892b0; text-decoration: none; transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(108,99,255,.15); border-right: 3px solid var(--primary); }
        .sidebar a i { width: 20px; text-align: center; }
        .main { margin-left: var(--sidebar-w); padding: 30px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card-stat { border: none; border-radius: 16px; padding: 24px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .card-stat .number { font-size: 2rem; font-weight: 800; color: var(--dark); }
        .card-stat .label { color: #8892b0; font-size: .85rem; margin-bottom: 8px; }
        .btn-logout { background: #ff4757; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .btn-logout:hover { background: #e84118; color: #fff; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info .name { font-weight: 600; }
        .user-info .role { font-size: .8rem; color: #8892b0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-brain"></i> ThinkNalyze</div>
        <nav>
            <a href="/ops/dashboard" class="active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/ops/notifications"><i class="fas fa-bell"></i> Notifications</a>
            <a href="/ops/subscriptions"><i class="fas fa-credit-card"></i> Subscriptions</a>
            <a href="/ops/users"><i class="fas fa-users"></i> Users</a>
        </nav>
    </div>
    <div class="main">
        <div class="topbar">
            <div>
                <h3>Operasional Dashboard</h3>
                <small class="text-muted" id="greeting">Welcome back!</small>
            </div>
            <div class="user-info">
                <div>
                    <div class="name" id="userName">-</div>
                    <div class="role" id="userRole">-</div>
                </div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="label"><i class="fas fa-users"></i> Total Users</div>
                    <div class="number" id="statUsers">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="label"><i class="fas fa-bell"></i> Active Notifications</div>
                    <div class="number" id="statNotif">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="label"><i class="fas fa-credit-card"></i> Subscription Plans</div>
                    <div class="number" id="statSubs">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="label"><i class="fas fa-id-card"></i> KYC Pending</div>
                    <div class="number" id="statKYC">-</div>
                </div>
            </div>
        </div>
        <div class="card-stat">
            <h5>System Status</h5>
            <p class="text-muted mt-2">All services running normally.</p>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) { window.location.href = '/account/login'; }
        document.getElementById('userName').textContent = user.name || '-';
        document.getElementById('userRole').textContent = (user.role || '-') + ' (' + (user.group || '') + ')';
        document.getElementById('greeting').textContent = 'Welcome back, ' + (user.name || 'Admin') + '!';

        // Load stats
        fetch('/api/operational/stats')
            .then(r => r.json())
            .then(res => {
                if (res.data) {
                    document.getElementById('statUsers').textContent = res.data.total_users || 0;
                    document.getElementById('statNotif').textContent = res.data.active_notifications || 0;
                    document.getElementById('statSubs').textContent = res.data.subscription_plans || 0;
                    document.getElementById('statKYC').textContent = res.data.pending_kyc || 0;
                }
            }).catch(() => {});

        function logout() {
            localStorage.removeItem('user'); localStorage.removeItem('token');
            document.cookie.split(";").forEach(c => { document.cookie = c.replace(/^ +/,"").replace(/=.*/,"=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/"); });
            window.location.href = '/account/login';
        }
    </script>
</body>
</html>
