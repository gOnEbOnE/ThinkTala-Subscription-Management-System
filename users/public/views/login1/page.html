<script>
(function () {
    const $ = id => document.getElementById(id);

    const titleEl       = $("title");
    const passwordField = $("password");
    const showHideBtn   = $("show-hide");
    const loginForm     = $("login-form");
    const loginBtn      = $("login-btn");
    const csrfEl        = $("csrf");

    let isSubmitted = false; 

    // Ambil jumlah gagal dari localStorage
    let failCount = parseInt(localStorage.getItem("failCount") || "0");
    let cooldownUntil = parseInt(localStorage.getItem("cooldownUntil") || "0");

    // Fungsi hitung delay (maks 30 detik)
    const getFailDelay = () => Math.min(2000 * Math.pow(2, failCount - 1), 30000);

    // Fungsi reset tombol
    const resetLoginState = (delay = 0) => {
        setTimeout(() => {
            loginBtn.innerHTML = "Masuk";
            loginBtn.disabled = false;
            isSubmitted = false;
        }, delay);
    };

    // Set judul halaman
    if (titleEl) titleEl.textContent = "{{.title}}";

    // Toggle show/hide password
    if (showHideBtn && passwordField) {
        showHideBtn.addEventListener("click", () => {
            const isText = passwordField.type === "text";
            passwordField.type = isText ? "password" : "text";
            showHideBtn.innerHTML = isText
                ? '<i class="fa fa-eye text-success"></i>'
                : '<i class="fa fa-eye-slash text-danger"></i>';
        });
    }

    // Cek cooldown saat halaman load
    if (cooldownUntil > Date.now()) {
        const remaining = cooldownUntil - Date.now();
        loginBtn.disabled = true;
        alertWarning(`Tunggu ${Math.ceil(remaining / 1000)} detik sebelum mencoba lagi`);
        resetLoginState(remaining);
    }

    // Submit form login
    if (loginForm && loginBtn) {
        loginForm.addEventListener("submit", async e => {
            e.preventDefault();

            if (isSubmitted) return; // Lock agar tidak spam klik
            isSubmitted = true;

            // Cek kalau masih dalam cooldown
            if (cooldownUntil > Date.now()) {
                const remaining = cooldownUntil - Date.now();
                alertWarning(`Tunggu ${Math.ceil(remaining / 1000)} detik sebelum mencoba lagi`);
                resetLoginState(remaining);
                return;
            }

            // UI lock
            loginBtn.innerHTML = '<div class="lds-ellipsis" style="margin-left:-50px"><div></div><div></div><div></div><div></div></div>';
            loginBtn.disabled = true;

            try {
                const res = await fetch(loginForm.action+"?ref={{.data.ref}}&state={{.data.state}}", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "X-Requested-With": "XMLHttpRequest",
                        "X-CSRF-Token": csrfEl?.value || ""
                    },
                    body: new FormData(loginForm)
                });

                if (!res.ok) throw new Error(`Server error: ${res.status}`);

                const json = await res.json();
                if (csrfEl) csrfEl.value = json.csrf || "";

                if (json.status) {
                    if (json.ref != "") {
                        window.location.href = json.ref;
                        return
                    }
                    // Login sukses → reset hitungan gagal
                    failCount = 0;
                    localStorage.setItem("failCount", "0");
                    localStorage.setItem("cooldownUntil", "0");
                    resetLoginState(0);
                    page("welcome");
                    alertSuccess(json.msg);
                } else {
                    // Login gagal → tambah hitungan dan simpan ke localStorage
                    failCount++;
                    localStorage.setItem("failCount", failCount);

                    const delay = getFailDelay();
                    cooldownUntil = Date.now() + delay;
                    localStorage.setItem("cooldownUntil", cooldownUntil);

                    resetLoginState(delay);
                    alertWarning(`${json.msg} (Tunggu ${delay / 1000} detik)`);
                }
            } catch (err) {
                console.error(err);
                alertDanger(err);

                // Error dianggap gagal juga
                failCount++;
                localStorage.setItem("failCount", failCount);

                const delay = getFailDelay();
                cooldownUntil = Date.now() + delay;
                localStorage.setItem("cooldownUntil", cooldownUntil);

                resetLoginState(delay);
            }
        });
    }
})();
</script>
