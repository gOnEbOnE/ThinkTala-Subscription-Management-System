    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --sidebar-width: 260px;
            --sidebar-mini-width: 80px;
            --navbar-height: 70px;
            --footer-height: 60px;
            --primary-color: #4e73df;
            --sidebar-bg: #1a1c23;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fc;
            overflow-x: hidden;
            transition: font-size 0.2s;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1050;
            background-color: var(--sidebar-bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            transition: width var(--transition-speed) ease-in-out, left var(--transition-speed) ease-in-out;
            white-space: nowrap;
            overflow: visible;
        }

        .sidebar .logo-area {
            height: var(--navbar-height);
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Diubah menjadi flex-start agar rata kiri */
            padding: 0 20px; /* Padding disesuaikan dengan nav-link */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .sidebar .logo-area img {
            max-height: 40px;
            transition: var(--transition-speed);
        }

        /* LOGO SWITCH LOGIC */
        .logo-mini { display: none; }
        body.toggled-minimize .logo-full { display: none !important; }
        body.toggled-minimize .logo-mini { display: block !important; }

        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            justify-content: flex-start; /* Memastikan konten rata kiri */
        }

        .sidebar .nav-link i {
            font-size: 1.2rem;
            min-width: 35px;
            text-align: left; /* Ikon dipastikan rata kiri di dalam box-nya */
        }

        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255,255,255,0.05);
            border-left-color: var(--primary-color);
        }

        .sidebar .collapse { background-color: rgba(0,0,0,0.2); }
        .sidebar .collapse .nav-link { padding-left: 55px; font-size: 0.85rem; }

        /* --- CONTENT WRAPPERS --- */
        .top-navbar {
            position: fixed;
            top: 0;
            right: 0;
            left: var(--sidebar-width);
            height: var(--navbar-height);
            background-color: #ffffff;
            z-index: 1000;
            box-shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: left var(--transition-speed);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            margin-top: var(--navbar-height);
            padding: 2rem;
            min-height: 100vh;
            transition: margin-left var(--transition-speed);
        }

        .footer {
            margin-left: var(--sidebar-width);
            height: var(--footer-height);
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #e3e6f0;
            transition: margin-left var(--transition-speed);
        }

        /* --- STATE: MINIMIZED --- */
        body.toggled-minimize .sidebar { width: var(--sidebar-mini-width); }
        body.toggled-minimize .sidebar span, 
        body.toggled-minimize .sidebar .arrow-icon,
        body.toggled-minimize .sidebar .logo-text { 
            opacity: 0; visibility: hidden; display: none !important; 
        }

        body.toggled-minimize .top-navbar { left: var(--sidebar-mini-width); }
        body.toggled-minimize .main-content, 
        body.toggled-minimize .footer { margin-left: var(--sidebar-mini-width); }

        /* Floating Submenu Popup Penyesuaian Agar Tidak Terpotong */
        body.toggled-minimize .sidebar .collapse.show,
        body.toggled-minimize .sidebar .collapsing {
            position: fixed;
            left: var(--sidebar-mini-width);
            width: 220px;
            background-color: var(--sidebar-bg) !important;
            box-shadow: 8px 0 15px rgba(0,0,0,0.3);
            border-radius: 0 8px 8px 0;
            z-index: 9999;
            display: block !important;
            height: auto !important;
            transition: none !important; 
        }

        body.toggled-minimize .sidebar .collapse.show span,
        body.toggled-minimize .sidebar .collapsing span {
            display: inline-block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        /* Penyesuaian Padding Submenu saat Minimize agar tidak bergeser */
        body.toggled-minimize .sidebar .collapse .nav-link {
            padding-left: 20px !important;
        }

        /* --- NAVBAR COMPONENTS --- */
        .nav-icon-btn {
            position: relative;
            cursor: pointer;
            color: #858796;
            transition: 0.2s;
        }
        .nav-icon-btn:hover { color: var(--primary-color); }
        .badge-counter {
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.65rem;
            padding: 2px 5px;
        }

        /* --- MOBILE MODE --- */
        @media (max-width: 767.98px) {
            .sidebar { left: -100%; }
            .top-navbar, .main-content, .footer { left: 0; margin-left: 0; }
            body.sidebar-open .sidebar { left: 0; width: var(--sidebar-width); }
            .sidebar-backdrop {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.5); z-index: 1040;
            }
            body.sidebar-open .sidebar-backdrop { display: block; }
        }

        /* --- FAB --- */
        .fab-wrapper { position: fixed; bottom: 80px; right: 30px; z-index: 2000; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; }
        .fab-main { width: 60px; height: 60px; background-color: var(--primary-color); border-radius: 50%; color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.5rem; transition: transform 0.3s; }
        .fab-item { width: 50px; height: 50px; background-color: white; border-radius: 50%; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2); opacity: 0; transform: translateY(20px); visibility: hidden; transition: 0.3s; display: flex; align-items: center; justify-content: center; color: #333; }
        .fab-wrapper.active .fab-item { opacity: 1; transform: translateY(0); visibility: visible; }
        .fab-wrapper.active .fab-main { transform: rotate(45deg); }

        [data-bs-theme="dark"] body { background-color: #121212; color: #e0e0e0; }
        [data-bs-theme="dark"] .top-navbar, [data-bs-theme="dark"] .footer, [data-bs-theme="dark"] .card { background-color: #1e1e2d; border-color: #2d2d3f; color: #fff; }
        
        /* Fix Visibilitas FAB Icon di Dark Mode */
        [data-bs-theme="dark"] .fab-item {
            background-color: #2b2c40;
            color: #ffffff !important;
            border: 1px solid #444;
        }
        [data-bs-theme="dark"] .nav-icon-btn { color: #a1a1b5; }
        [data-bs-theme="dark"] #fontSliderPopup { background-color: #1e1e2d !important; color: #fff; border: 1px solid #444; }
    
        td, th {
            white-space: nowrap;
        }
    </style>

    <script>
        // Logika Sidebar
        function handleSidebarToggle() {
            const width = window.innerWidth;
            if (width < 768) {
                document.body.classList.toggle('sidebar-open');
                document.body.classList.remove('toggled-minimize');
            } else {
                document.body.classList.toggle('toggled-minimize');
                document.body.classList.remove('sidebar-open');
                
                // Tutup submenu terbuka saat sidebar dikecilkan
                if(document.body.classList.contains('toggled-minimize')) {
                    document.querySelectorAll('.sidebar .collapse').forEach(c => {
                        const bsc = bootstrap.Collapse.getInstance(c);
                        if(bsc) bsc.hide();
                    });
                }
            }
        }

        // Penempatan Submenu Pop-up
        document.querySelectorAll('.sidebar .nav-link[data-bs-toggle="collapse"]').forEach(link => {
            link.addEventListener('click', function () {
                if (!document.body.classList.contains('toggled-minimize')) return;
                const targetId = this.getAttribute('href');
                const submenu = document.querySelector(targetId);
                setTimeout(() => {
                    if (submenu && (submenu.classList.contains('show') || submenu.classList.contains('collapsing'))) {
                        const rect = this.getBoundingClientRect();
                        submenu.style.top = rect.top + 'px';
                    }
                }, 10);
            });
        });

        // FAB & Theme
        function toggleFab() { document.getElementById('fabWrapper').classList.toggle('active'); }
        function toggleFontSlider() { 
            const el = document.getElementById('fontSliderPopup');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-bs-theme') === 'dark';
            html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
            const themeIcon = document.getElementById('themeIcon');
            if (isDark) {
                themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
            } else {
                themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
            }
        }

        window.addEventListener('resize', () => { if (window.innerWidth >= 768) document.body.classList.remove('sidebar-open'); });
    </script>
