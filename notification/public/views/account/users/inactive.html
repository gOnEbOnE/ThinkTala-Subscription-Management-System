<script data-safe="true">
    (function() {
        
        // ==========================================
        // 1. STATE MANAGEMENT
        // ==========================================
        let state = {
            page: 1,
            limit: 12,
            search: '',
            totalData: 0,
            totalPages: 0
        };

        // ==========================================
        // 2. DOM ELEMENTS
        // ==========================================
        const tableBody = document.getElementById('data');
        const searchInput = document.getElementById('searchInput');
        const limitSelect = document.getElementById('limitSelect');
        const pageSelect = document.getElementById('pageSelect');
        const pageInfo = document.getElementById('pageInfo');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const selectAll = document.getElementById('selectAll');
        const btnBulkDelete = document.getElementById('btnBulkDelete');

        // Modal Elements
        const modalEditEl = document.getElementById('modalEditUser');
        const modalEdit = new bootstrap.Modal(modalEditEl); 
        const formEdit = document.getElementById('formEditUser');
        
        // Tombol Submit (Pastikan di HTML sudah ada id="btnUpdateUser")
        const btnUpdateUser = document.getElementById('btnUpdateUser');

        // ==========================================
        // 3. LOGIKA EDIT USER (Fetch Detail)
        // ==========================================
        window.editUser = async function(id) {
            console.log("Fetching detail for:", id);

            formEdit.reset(); // Bersihkan form
            
            // Simpan ID ke input hidden agar mudah diambil nanti
            document.getElementById('editId').value = id;

            try {
                const response = await fetch(`/account/users/detail/${id}`);
                
                if (!response.ok) throw new Error("Gagal mengambil detail user");
                
                const result = await response.json();

                if (result.status) {
                    const user = result.data;

                    // Isi Form
                    document.getElementById('editNama').value = user.fullname;
                    document.getElementById('editNik').value = user.nik || '';
                    document.getElementById('editNrk').value = user.nrk || '';

                    // Isi Radio Button
                    if (user.is_active || user.status === 'Aktif') {
                        const rb = formEdit.querySelector('input[name="is_active"][value="1"]');
                        if(rb) rb.checked = true;
                    } else {
                        const rb = formEdit.querySelector('input[name="is_active"][value="0"]');
                        if(rb) rb.checked = true;
                    }

                    if (user.dokumen_pendukung != '') {

                        doc = `<label class="form-label fw-bold small">Status</label>
                            <object 
                                data="https://edu.jakarta.go.id/cdn/files/register/dokumen_pendukung/`+user.dokumen_pendukung+`" 
                                type="application/pdf" 
                                width="100%" 
                                height="600px">
                                <p>Browser tidak mendukung PDF.
                                <a href="https://edu.jakarta.go.id/cdn/files/register/dokumen_pendukung/`+user.dokumen_pendukung+`">Download PDF</a>
                                </p>
                            </object>`

                        document.getElementById('file-pendukung').innerHTML = doc || '';
                    } else {
                        document.getElementById('file-pendukung').innerHTML = '';
                    }

                    modalEdit.show();
                } else {
                    alert(result.msg);
                }

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan saat mengambil data user.");
            }
        };

        // ==========================================
        // 4. LOGIKA UPDATE USER (MANUAL FETCH - STABIL)
        // ==========================================
        // Kita pakai addEventListener manual karena URL-nya dinamis
        formEdit.addEventListener('submit', async function(e) {
            e.preventDefault(); // Mencegah reload halaman

            // 1. Ambil ID dari hidden input
            const id = document.getElementById('editId').value;
            if(!id) { alert("ID User tidak ditemukan"); return; }

            // 2. UX: Loading State pada Tombol
            const originalText = btnUpdateUser.innerHTML;
            btnUpdateUser.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...`;
            btnUpdateUser.disabled = true;

            // 3. Ambil Data Form (FORM DATA - Sesuai permintaan backend ParseForm)
            const formData = new FormData(formEdit);

            try {
                // Delay sedikit biar terlihat prosesnya (Opsional 500ms)
                await new Promise(r => setTimeout(r, 500));

                // 4. Kirim ke Backend (POST)
                const response = await fetch(`/account/users/update/${id}`, {
                    method: 'POST', // Backend mengharapkan POST + FormData
                    body: formData  // Browser otomatis mengatur Content-Type ke multipart/form-data
                });

                const result = await response.json();

                if (result.status) {
                    // SUKSES
                    modalEdit.hide(); // Tutup Modal
                    fetchData();      // Reload Tabel
                    // alert("Data berhasil diupdate!"); // Opsional
                } else {
                    // GAGAL DARI BACKEND
                    alert("Gagal update: " + result.msg);
                }

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan jaringan atau server error.");
            } finally {
                // 5. Reset Tombol (Apapun hasilnya)
                btnUpdateUser.innerHTML = originalText;
                btnUpdateUser.disabled = false;
            }
        });


        // ==========================================
        // 5. FETCH DATA (LISTING TABLE)
        // ==========================================
        async function fetchData() {
            tableBody.innerHTML = `<tr><td colspan="12" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Memuat data...</td></tr>`;
            
            try {
                const query = new URLSearchParams({
                    page: state.page,
                    limit: state.limit,
                    q: state.search
                });

                const response = await fetch(`/account/users/data/inactive?${query.toString()}`);
                
                if (response.redirected && response.url.includes('/login')) {
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) throw new Error("Gagal mengambil data");

                // Update Nonce (Security)
                const newNonce = response.headers.get("X-Page-Nonce");
                if (newNonce) {
                    const meta = document.querySelector("meta[name='csp-nonce']");
                    if (meta) meta.setAttribute("content", newNonce);
                }

                const result = await response.json();
                
                const users = result.data || [];
                const meta = result.meta || { total_items: 0, total_pages: 1 };

                state.totalData = meta.total_items;
                state.totalPages = meta.total_pages;

                renderTable(users);
                renderPagination();
                resetSelection(); 

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `<tr><td colspan="12" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Gagal memuat data</td></tr>`;
            }
        }

        // ==========================================
        // 6. RENDER FUNCTIONS
        // ==========================================
        function renderTable(users) {
            if (users.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="12" class="text-center py-5 text-muted">Tidak ada data ditemukan</td></tr>`;
                return;
            }

            const startNumber = (state.page - 1) * state.limit;

            const html = users.map((user, index) => {
                const nomor = startNumber + index + 1;

                return `
                <tr>
                    <td class="ps-4">
                        <div class="form-check">
                            <input class="form-check-input row-checkbox" type="checkbox" value="${user.id}">
                        </div>
                    </td>
                    <td class="fw-bold text-secondary">${nomor}</td>
                    <td>${escapeHtml(user.fullname)}</td>
                    <td>${escapeHtml(user.nik)}</td>
                    <td>${escapeHtml(user.nrk)}</td>
                    <td>${escapeHtml(user.nikki)}</td>
                    <td>${escapeHtml(user.group_name)}</td>
                    <td>${escapeHtml(user.role_name)}</td>
                    <td>${escapeHtml(user.level_name)}</td>
                    <td>
                        <span class="badge rounded-pill ${user.status === 'Aktif' ? 'bg-success-subtle text-success border-success-subtle' : 'bg-warning-subtle text-warning border-warning-subtle'} border">
                            Pending
                        </span>
                    </td>
                    <td class="text-center pe-4">
                        <div class="btn-group">
                            <button class="btn btn-sm btn-light border-secondary-subtle rounded-3 me-1" onclick="editUser('${user.id}')" title="Edit">
                                <i class="bi bi-pencil-square text-primary"></i>
                            </button>
                            
                        </div>
                    </td>
                </tr>
            `}).join('');

            tableBody.innerHTML = html;
            attachCheckboxListeners();
        }

        function renderPagination() {
            const start = (state.page - 1) * state.limit + 1;
            const end = Math.min(start + state.limit - 1, state.totalData);
            const displayStart = state.totalData === 0 ? 0 : start;
            const displayEnd = state.totalData === 0 ? 0 : end;

            pageInfo.innerHTML = `Menampilkan <span class="fw-bold text-emphasis">${displayStart}-${displayEnd}</span> dari <span class="fw-bold text-emphasis">${state.totalData}</span> data`;

            let options = '';
            for (let i = 1; i <= state.totalPages; i++) {
                options += `<option value="${i}" ${i === state.page ? 'selected' : ''}>${i}</option>`;
            }
            pageSelect.innerHTML = options;

            btnPrev.disabled = state.page <= 1;
            btnNext.disabled = state.page >= state.totalPages;
        }

        // ==========================================
        // 7. EVENT LISTENERS
        // ==========================================
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                state.search = e.target.value;
                state.page = 1;
                fetchData();
            }, 500);
        });

        limitSelect.addEventListener('change', (e) => {
            state.limit = parseInt(e.target.value);
            state.page = 1;
            fetchData();
        });

        pageSelect.addEventListener('change', (e) => {
            state.page = parseInt(e.target.value);
            fetchData();
        });

        btnPrev.addEventListener('click', () => {
            if (state.page > 1) {
                state.page--;
                fetchData();
            }
        });

        btnNext.addEventListener('click', () => {
            if (state.page < state.totalPages) {
                state.page++;
                fetchData();
            }
        });

        function attachCheckboxListeners() {
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            rowCheckboxes.forEach(cb => {
                cb.addEventListener('change', function() {
                    if (!this.checked) selectAll.checked = false;
                    checkSelectAllStatus();
                    toggleBulkButton();
                });
            });
        }

        selectAll.addEventListener('change', function() {
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            rowCheckboxes.forEach(cb => cb.checked = this.checked);
            toggleBulkButton();
        });

        function checkSelectAllStatus() {
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            if (rowCheckboxes.length > 0 && document.querySelectorAll('.row-checkbox:checked').length === rowCheckboxes.length) {
                selectAll.checked = true;
            }
        }

        function toggleBulkButton() {
            const checkedCount = document.querySelectorAll('.row-checkbox:checked').length;
            if (checkedCount > 0) {
                btnBulkDelete.classList.remove('d-none');
                btnBulkDelete.innerHTML = `<i class="bi bi-trash me-1"></i> Hapus (${checkedCount})`;
            } else {
                btnBulkDelete.classList.add('d-none');
            }
        }

        function resetSelection() {
            selectAll.checked = false;
            toggleBulkButton();
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        window.deleteUser = function(id) {
            if(confirm("Yakin hapus data ini?")) {
                console.log("Delete user:", id);
            }
        };

        // Load Initial Data
        fetchData();

    })();
</script>

        fetchData();
    });

    // Page Select Change
    pageSelect.addEventListener('change', (e) => {
        state.page = parseInt(e.target.value);
        fetchData();
    });

    // Button Prev
    btnPrev.addEventListener('click', () => {
        if (state.page > 1) {
            state.page--;
            fetchData();
        }
    });

        if (state.page < state.totalPages) {
            state.page++;
            fetchData();
        }
    });
