services:
  postgres:
    image: postgres:15-alpine
    container_name: thinknalyze-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=thinknalyze
    ports:
      - "5433:5432"
    volumes:
      - thinknalyze-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thinknalyze"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - thinknalyze-network

  redis:
    image: redis:7-alpine
    container_name: thinknalyze-redis
    ports:
      - "6379:6379"
    volumes:
      - thinknalyze-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - thinknalyze-network

  # --- API GATEWAY ---
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: thinknalyze-gateway
    ports:
      - "2000:2000"
    environment:
      - port=2000
      - timezone=Asia/Jakarta
    volumes:
      - ./gateway/routes.json:/app/routes.json:ro
      - ./gateway/certs:/app/certs:ro
    depends_on:
      - notification
      - operational
      - subscription
      - tickets
      - users
    networks:
      - thinknalyze-network

  # --- MICROSERVICES ---
  notification:
    build: ./notification
    container_name: thinknalyze-notification
    environment:
      - PORT=2001
    networks:
      - thinknalyze-network

  operational:
    build: ./operational
    container_name: thinknalyze-operational
    environment:
      - PORT=2002
    networks:
      - thinknalyze-network

  subscription:
    build: ./subscription
    container_name: thinknalyze-subscription
    environment:
      - PORT=2003
    networks:
      - thinknalyze-network

  tickets:
    build: ./tickets
    container_name: thinknalyze-tickets
    environment:
      - PORT=2004
    networks:
      - thinknalyze-network

  users:
    build: ./users
    container_name: thinknalyze-users
    environment:
      - PORT=2005
    networks:
      - thinknalyze-network

networks:
  thinknalyze-network:
    driver: bridge

volumes:
  thinknalyze-postgres-data:
  thinknalyze-redis-data: