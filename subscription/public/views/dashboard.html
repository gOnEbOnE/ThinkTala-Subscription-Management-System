<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | ThinkNalyze</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6C63FF; --dark: #1a1a2e; --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f6fc; }
        .sidebar { width: var(--sidebar-w); height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; color: #fff; padding: 20px 0; }
        .sidebar .logo { padding: 0 20px 30px; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #8892b0; text-decoration: none; transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(108,99,255,.15); border-right: 3px solid var(--primary); }
        .sidebar a i { width: 20px; text-align: center; }
        .main { margin-left: var(--sidebar-w); padding: 30px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card-stat { border: none; border-radius: 16px; padding: 24px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .btn-logout { background: #ff4757; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .btn-logout:hover { background: #e84118; color: #fff; }
        .plan-card { background: linear-gradient(135deg, #6C63FF 0%, #3F3D9E 100%); border-radius: 16px; padding: 30px; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-brain"></i> ThinkNalyze</div>
        <nav>
            <a href="/client/dashboard" class="active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/client/subscription"><i class="fas fa-crown"></i> Subscription</a>
            <a href="/client/kyc"><i class="fas fa-id-card"></i> KYC</a>
        </nav>
    </div>
    <div class="main">
        <div class="topbar">
            <div>
                <h3>Welcome to ThinkNalyze</h3>
                <small class="text-muted" id="greeting"></small>
            </div>
            <div>
                <span id="userName" style="font-weight:600;"></span>
                <button class="btn-logout ms-3" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="plan-card mb-4">
            <h5><i class="fas fa-crown"></i> Current Plan</h5>
            <h2>Free Plan</h2>
            <p>Upgrade to Pro or Elite for full AI trading features.</p>
            <a href="/client/subscription" class="btn btn-light">Upgrade Now</a>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-stat text-center">
                    <i class="fas fa-chart-line fa-2x mb-2" style="color:var(--primary)"></i>
                    <h6>Market Insight</h6>
                    <p class="text-muted small">AI-powered analysis</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat text-center">
                    <i class="fas fa-robot fa-2x mb-2" style="color:var(--primary)"></i>
                    <h6>Ask Nizza</h6>
                    <p class="text-muted small">AI trading assistant</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat text-center">
                    <i class="fas fa-id-card fa-2x mb-2" style="color:var(--primary)"></i>
                    <h6>KYC Status</h6>
                    <p class="text-muted small">Not submitted</p>
                    <a href="/client/kyc" class="btn btn-sm btn-outline-primary">Verify</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.id) { window.location.href = '/account/login'; }
        document.getElementById('userName').textContent = user.name || 'User';
        document.getElementById('greeting').textContent = 'Hello, ' + (user.name || 'User') + '!';

        function logout() {
            localStorage.removeItem('user'); localStorage.removeItem('token');
            document.cookie.split(";").forEach(c => { document.cookie = c.replace(/^ +/,"").replace(/=.*/,"=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/"); });
            window.location.href = '/account/login';
        }
    </script>
</body>
</html>
