<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Edukasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{.assets_url}}/assets/css/styles.css">
    
</head>
<body class="bg-body-tertiary">

    <div class="container-fluid g-0">
        <div class="row g-0 vh-100">
            <div class="col-lg-6 d-none d-lg-block banner-side">
                <div class="banner-overlay d-flex flex-column justify-content-end p-5">
                    <div class="text-white mb-5 pb-5">
                        <span class="badge bg-primary bg-opacity-75 backdrop-blur rounded-pill px-3 py-2 mb-3">
                            <i class="bi bi-stars me-1"></i> AI Powered Education
                        </span>
                        <h1 class="display-4 fw-bold mb-3">Revolusi Pendidikan <br> dengan Kecerdasan AI</h1>
                        <p class="lead text-white-50" style="max-width: 500px;">
                            Kelola data siswa, analisis performa, dan optimalkan pembelajaran dengan bantuan teknologi AI terdepan dari JakEdu.
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-body p-4">
                <div class="auth-card w-100" style="max-width: 420px;">
                    
                    <div>
                        <div class="text-center mb-4">
                            <div class="bg-primary-subtle text-primary rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-robot fs-2"></i>
                            </div>
                            <h3 class="fw-bold text-emphasis">Selamat Datang Kembali</h3>
                            <p class="text-muted small">Masuk untuk mengakses dashboard JakEdu AI</p>
                        </div>

                        <form onsubmit="event.preventDefault();" id="loginForm" action="{{.assets_url}}/login/auth" method="POST">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body-tertiary border-secondary-subtle border-end-0 rounded-start-3">
                                        <i class="bi bi-envelope text-muted"></i>
                                    </span>
                                    <input type="email" name="email" class="form-control bg-body-tertiary border-secondary-subtle border-start-0 rounded-end-3" placeholder="email" >
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-body-tertiary border-secondary-subtle border-end-0 rounded-start-3">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" name="password" class="form-control bg-body-tertiary border-secondary-subtle border-start-0 rounded-end-3" placeholder="••••••••" >
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input rounded-1" type="checkbox" id="rememberMe">
                                    <label class="form-check-label small text-muted" for="rememberMe">Ingat saya</label>
                                </div>
                                <a href="{{.assets_url}}/reset" class="small text-primary text-decoration-none fw-semibold">Lupa Password?</a>
                            </div>

                            <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2 rounded-3 fw-bold shadow-sm mb-3">
                                Masuk Sekarang <i class="bi bi-arrow-right ms-2"></i>
                            </button>

                            <div class="text-center">
                                <span class="text-muted small">Belum punya akun?</span>
                                <a href="{{.assets_url}}/register" class="text-primary fw-bold text-decoration-none small ms-1">Daftar Akun</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary theme-toggle-btn rounded-circle" id="themeToggle" title="Ganti Tema">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{.assets_url}}/assets/js/za-form.js" defer></script>
    <script src="{{.assets_url}}/assets/js/za-toast.js" defer></script>
    <script src="{{.assets_url}}/assets/js/za-landing-theme.js" defer></script>

    <script type="module">
        new SecureForm('#loginForm', '#loginBtn', {
            initialDelay: 2000,
            onSuccess: '{{.assets_url}}/account'
        });
    </script>


</body>
</html>
